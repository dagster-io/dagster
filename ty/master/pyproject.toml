# ty `master` environment.
#
# Self-contained env definition: deps + uv.lock + the env's `[tool.ty.*]`
# config all live here. `scripts/run-ty.py` reads the `[tool.ty]` block,
# translates it to a temp ty.toml at `dagster-oss/` (the project root,
# per the convention: envs under `dagster-oss/` anchor at `dagster-oss/`,
# everything else at the worktree root), and invokes ty with
# `--config-file=<temp>` from that cwd. Include paths in `[tool.ty.src]`
# are therefore anchored to `dagster-oss/`.
#
# To add a dependency: append it to `[project].dependencies` (and to
# `[tool.uv.sources]` with an editable path entry if it lives in this repo),
# then run `just rebuild_ty_pins` from `dagster-oss/`.

[project]
name = "ty-master"
version = "0.0.0"
description = "ty environment for the dagster-oss `master` profile."
requires-python = ">=3.12,<3.13"

dependencies = [
  # ---- Helm
  "dagster-helm",

  # ---- Integration tests
  "dagster-k8s-test-infra",

  # ---- Top-level libraries
  "automation",
  "dagit",
  "dagster[pyright,test]",
  "dagster-graphql",
  "dagster-pipes[stubs]",
  "dagster-sphinx",
  "dagster-test",
  "dagster-webserver",

  # ---- python_modules/libraries/*
  "create-dagster",
  "dagster-airbyte",
  "dagster-airflow",
  "dagster-airlift[mwaa]",      # pulls airflow
  "dagster-aws[stubs]",
  "dagster-azure",
  "dagster-celery",
  "dagster-celery-docker",
  "dagster-celery-k8s",
  "dagster-census",
  "dagster-clickhouse",
  "dagster-clickhouse-pandas",
  "dagster-clickhouse-polars",
  "dagster-cloud-cli",
  "dagster-dask[yarn,pbs,kube]",
  "dagster-databricks",
