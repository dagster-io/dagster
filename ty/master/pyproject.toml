  "sling_decorator",

  # ---- Constrained beyond runtime — typed-package floors/pins where the
  # supported version range has bugged or incomplete annotations.
  "apache-airflow>2.7",
  "types-sqlalchemy==1.4.53.34",
  "fastapi>=0.115.6",
  "types-setuptools==80.9.0.20250822",
  "clickhouse-driver==0.2.9",
  "testcontainers[clickhouse]==4.9.1",
  # Floors below prevent the resolver from picking ancient versions when the
  # solution space widens; without them mlflow trades 3.x → 1.27 (and
  # pydantic/cssutils similarly) to keep pyarrow/packaging on newest versions.
  "mlflow>=3.11.1",
  "pydantic>=2.13.3",
  "cssutils>=2.15",
  "starlette>=1.0",
]

# Aikido blocks PyPI packages newer than 48h. Pin globally so `uv lock` works
# from dev machines without setting UV_EXCLUDE_NEWER ad-hoc.
[tool.uv]
exclude-newer = "48h"

