# ########################
# ##### TY (Type Checker)
# ########################
#
# [Docs root]
#   https://docs.astral.sh/ty/
# [Configuration reference]
#   https://docs.astral.sh/ty/configuration/
#
# Include / exclude / extra-paths / override paths are anchored to
# `dagster-oss/` (this env's project root, set by `run-ty.py` via cwd
# when invoking ty).

[tool.ty.environment]
# Minimum version of Python on which code must run.
python-version = "3.10"

[tool.ty.rules]
# Kept in lock-step with the other ty envs — the
# `test_ty_config_consistency` lint asserts identical `[tool.ty.rules]`
# across every committed ty config.
#
# ty is configured as a "strict mode" tool for selective use on specific files/packages.
# It reports 10-100x more diagnostics than pyright because:
#   1. pyright's `useLibraryCodeForTypes = false` treats untyped code as Any
#   2. ty performs comprehensive type inference even on untyped dependencies
#
deprecated = "ignore"                  # Deprecation warnings across dependencies
possibly-missing-attribute = "ignore"  # High false positive rate
possibly-missing-import = "ignore"     # Often incorrect in complex imports
# Suppress leftover `# type: ignore` / `# ty: ignore` directives that
# no longer apply. Especially relevant for the data-platform and
# internal envs after ty version bumps; no-op for master today.
unused-type-ignore-comment = "ignore"
unused-ignore-comment = "ignore"

[tool.ty.src]

# Paths owned by this env (previously `ty/master/ty.yaml`'s `paths:`).
#
# `.buildkite/` is intentionally not enrolled: it is not in pyright's
# include.txt either, and buildkite-shared uses 3.11+ stdlib features
# (typing.Self, enum.StrEnum, tomllib) while this env's
# `tool.ty.environment.python-version` is "3.10" — checking it produces
# ~90 cascading false positives. Enroll once buildkite-shared is either
# made 3.10-compatible or this env is bumped.
include = [
  "examples",
  "python_modules",
  "docs/sphinx/_ext/dagster-sphinx",
  "integration_tests",
  "scripts",
]

exclude = [
  # Example notebook intentionally references undefined names as placeholders.
  "python_modules/libraries/dagstermill/dagstermill/examples/notebooks/yield_something.ipynb",
  # Deliberately-malformed scaffold used as a fixture for notebook-creation tests.
  "python_modules/libraries/dagstermill/dagstermill_tests/notebooks/cli_test_scaffold.ipynb",
  # Documentation example trees contain illustrative snippets that reference
  # community / scaffolded packages not installed in this env; type-checking
  # them generates spurious unresolved-import diagnostics.
  "examples/docs_snippets",
  "examples/docs_projects",

  # There is code in dagster_graphql/implementation that as of ty 0.0.35 breaks
  # ty and causes runaway memory consumption. Tracked here:
  #   https://github.com/astral-sh/ty/issues/3445#issuecomment-4426769715
  "python_modules/dagster-graphql/dagster_graphql/implementation",

  # Vendored third-party code (croniter, dateutil).
  "python_modules/dagster/dagster/_vendored",

  # ty runner itself — uses 3.11+ stdlib (tomllib, typing.NotRequired) so
  # it can run without external deps in CI's system Python (3.12). This
  # env's python-version is 3.10 (matching dagster's minimum), so ty
  # would flag those imports as unresolved here.
  "scripts/run-ty.py",
]

# Ignore all files that are git-ignored unless explicitly included.
respect-ignore-files = true

# Override for dagster_graphql/schema: graphene's ObjectType / Mutation /
# InputObjectType / Interface metaclass synthesizes `__init__` kwargs from
# class-body field declarations, so e.g. `GrapheneFooType(message=..., path=...)`
# is valid at runtime even though ty can't see `message` or `path` as accepted
# kwargs. graphene doesn't ship `@dataclass_transform`-decorated bases, so ty
# reports every such kwarg as `unknown-argument`. Additionally, ty 0.0.35 doesn't
# narrow pydantic discriminated unions through `match result.typename__: case 'X':`,
# causing unresolved-attribute, invalid-argument-type, and not-subscriptable
# errors across the schema files. Disable all four rules for the schema subtree.
[[tool.ty.overrides]]
include = ["python_modules/dagster-graphql/dagster_graphql/schema/**"]

[tool.ty.overrides.rules]
# graphene's ObjectType / Mutation / etc. metaclass synthesizes __init__
# from class-body fields. ty doesn't see it and flags every kwarg.
unknown-argument = "ignore"
# All three below are caused by ty 0.0.35 not narrowing pydantic
# discriminated unions through `match result.typename__: case "X":`,
# which is the dominant pattern in schema files. Revisit when ty
# adds discriminated-union narrowing.
unresolved-attribute = "ignore"
invalid-argument-type = "ignore"
not-subscriptable = "ignore"
