[project]
name = "project_multi_tenant"
version = "1!0+dev"
description = "Dagster multi-tenant workspace example with isolated code locations"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "dagster",
    "duckdb>=1.5.0",
    "pandas>=2.2.0",
]

[project.optional-dependencies]
dev = [
    "dagster-dg-cli",
    "dagster-webserver",
    "pytest",
    "ruff",
]

[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["shared", "harbor_outfitters", "summit_financial", "beacon_hq"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.dg]
directory_type = "workspace"

[tool.dg.workspace]

[tool.ruff]
target-version = "py311"
line-length = 100

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "catalog_coach_runtime",
    "risk_reviewer_runtime",
    "briefing_writer_runtime",
]

[tool.uv.sources]
dagster = { path = "../../python_modules/dagster", editable = true }
dagster-pipes = { path = "../../python_modules/dagster-pipes", editable = true }
dagster-shared = { path = "../../python_modules/libraries/dagster-shared", editable = true }
dagster-dg-cli = { path = "../../python_modules/libraries/dagster-dg-cli", editable = true }
dagster-webserver = { path = "../../python_modules/dagster-webserver", editable = true }
catalog_coach_runtime = { path = "vendor/catalog_coach_runtime", editable = true }
risk_reviewer_runtime = { path = "vendor/risk_reviewer_runtime", editable = true }
briefing_writer_runtime = { path = "vendor/briefing_writer_runtime", editable = true }
