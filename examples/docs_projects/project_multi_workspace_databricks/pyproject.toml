[project]
name = "project_multi_workspace_databricks"
requires-python = ">=3.10,<3.15"
version = "0.1.0"
dependencies = [
    "dagster",
    "dagster-databricks",
    "dagster-fivetran",
    "kafka-python",
]

[dependency-groups]
dev = [
    "dagster-webserver",
    "dagster-dg-cli",
    "pytest",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.dg]
directory_type = "project"

[tool.dg.project]
root_module = "project_multi_workspace_databricks"
registry_modules = [
    "project_multi_workspace_databricks.components.*",
]

[tool.ruff]
lint.extend-select = ["I"]
