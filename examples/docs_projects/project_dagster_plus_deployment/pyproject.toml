[project]
name = "project_dagster_plus_deployment"
version = "0.0.1"
description = "Dagster+ multi-environment Kubernetes deployment example"
readme = "README.md"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster",
    "dagster-cloud",
]

[dependency-groups]
dev = [
    "dagster-webserver",
    "dagster-dg-cli",
    "pytest",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.dg]
directory_type = "project"

[tool.dg.project]
root_module = "project_dagster_plus_deployment"
registry_modules = [
    "project_dagster_plus_deployment.components.*",
]
