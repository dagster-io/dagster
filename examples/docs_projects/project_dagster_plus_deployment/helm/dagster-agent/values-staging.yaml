dagsterCloud:
  organization: "your-org"
  deployment: "staging"
  apiToken:
    secretName: dagster-cloud-agent-token
    secretKey: DAGSTER_CLOUD_AGENT_TOKEN
  branchDeployments: false

workspace:
  serverTTL:
    enabled: true
    ttlSeconds: 14400

dagsterCloudAgent:
  replicas: 1
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"

runLauncher:
  type: K8sRunLauncher
  config:
    k8sRunLauncher:
      envSecrets:
        - name: dagster-staging-env
      resources:
        requests:
          cpu: "1"
          memory: "2Gi"
        limits:
          cpu: "2"
          memory: "4Gi"
      nodeSelector:
        cloud.google.com/gke-nodepool: "staging-pool"

serviceAccount:
  create: true
  name: dagster-agent-staging
  annotations: {}
