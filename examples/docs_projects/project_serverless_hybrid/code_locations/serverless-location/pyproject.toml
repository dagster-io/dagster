[project]
name = "serverless-location"
requires-python = ">=3.10,<3.14"
version = "0.1.0"
dependencies = [
    "dagster",
    "dagster-cloud",
    "dagster-duckdb",
]

[dependency-groups]
dev = [
    "dagster-webserver",
    "dagster-dg-cli",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/serverless_location"]
force-include = { "pyproject.toml" = "pyproject.toml" }

[tool.dg]
directory_type = "project"

[tool.dg.project]
root_module = "serverless_location"
