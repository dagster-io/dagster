[tox]
requires =
    tox-uv>=1
skipsdist = True

[testenv]
download = True
passenv =
    CI_*
    BUILDKITE*
    DEPLOY_DOCKER_WEBSERVER_HOST
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
deps =
  -e ../../python_modules/dagster[test]
  -e ../../python_modules/dagster-pipes
  -e ../../python_modules/libraries/dagster-shared
allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  pytest -vv -s {posargs}
