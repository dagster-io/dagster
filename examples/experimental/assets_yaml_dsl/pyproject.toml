[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "assets_yaml_dsl"
version = "1!0+dev"
requires-python = ">=3.10,<3.15"
description = "Dagster example of yaml dsl for building asset graphs"
license = "Apache-2.0"
dependencies = [
    "dagster",
    "pandas",
    "dagster-pipes",
]

[project.optional-dependencies]
dev = ["dagster-webserver", "pytest"]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/examples/assets_yaml_dsl"

[tool.dagster]
module_name = "assets_yaml_dsl.definitions"
code_location_name = "assets_yaml_dsl"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-webserver",
    "dagster-graphql",
]

[tool.uv.sources]
dagster = { path = "../../../python_modules/dagster", editable = true }
dagster-pipes = { path = "../../../python_modules/dagster-pipes", editable = true }
dagster-shared = { path = "../../../python_modules/libraries/dagster-shared", editable = true }
dagster-webserver = { path = "../../../python_modules/dagster-webserver", editable = true }
dagster-graphql = { path = "../../../python_modules/dagster-graphql", editable = true }
