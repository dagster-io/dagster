[tox]
requires =
    tox-uv>=1.16
skipsdist = true

[testenv]
runner = uv-venv-lock-runner
uv_sync_locked = false
uv_sync_flags = --frozen
download = true
passenv =
    CI_*
    BUILDKITE*
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
# Two factors:
#   - source: install dagster libs from local checkouts (via [tool.uv.sources]
#     gated on the test-source group in pyproject.toml).
#   - pypi: install dagster libs from PyPI; exercises the released-package
#     install path including dagster-cloud.
dependency_groups =
    source: test-source
    pypi: test-pypi
allowlist_externals =
  /bin/bash
  uv
commands =
  source: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  pypi: /bin/bash -c 'uv pip list --exclude-editable | grep -q "^dagster "'
  pytest -vv
