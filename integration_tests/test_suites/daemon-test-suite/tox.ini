[tox]
requires =
    tox-uv>=1.16
skipsdist = True

[testenv]
runner = uv-venv-lock-runner
uv_sync_locked = false
uv_sync_flags = --frozen
download = True
passenv =
    HOME
    AIRFLOW_HOME
    AWS_*
    BUILDKITE*
    CI_*
    DAGSTER_*
    DOCKER_*
    GOOGLE_*
    KUBECONFIG
    POSTGRES_TEST_DB_HOST
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
dependency_groups =
    test
allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  pytest  -s -vv  {posargs}
