[project]
name = "daemon-test-suite"
version = "1!0+dev"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster",
    "dagster-graphql",
    "dagster-test",
    "dagster-aws",
    "dagster-pandas",
    "dagster-gcp",
    "dagster-celery",
    "dagster-celery-docker",
    "dagster-k8s",
    "dagster-celery-k8s",
    "dagster-postgres",
    "dagster-docker",
]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-graphql",
    "dagit",
    "dagster-webserver",
    "dagster-test",
    "dagster-aws",
    "dagster-pandas",
    "dagster-gcp",
    "dagster-celery",
    "dagster-celery-docker",
    "dagster-k8s",
    "dagster-celery-k8s",
    "dagster-postgres",
    "dagster-docker",
    "dagstermill",
    "dagster-slack",
    "objgraph",
]

[tool.uv.sources]
dagster = { path = "../../../python_modules/dagster", editable = true }
