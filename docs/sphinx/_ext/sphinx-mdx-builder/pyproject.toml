[project]
name = "sphinxcontrib-mdxbuilder"
description = "Sphinx extension tobuild MDX files"
authors = [
    {name = "Dagster Labs", email = "support@dagsterlabs.com"}
]
requires-python = ">=3.10"
readme = "README.md"

classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Framework :: Sphinx",
    "Framework :: Sphinx :: Extension",
]
version = "0.1.3"

dependencies = [
    "sphinx>=7.0",
]

[project.scripts]
sphinx-builder-mdx = "sphinxcontrib.mdxbuilder.__main__:main"

[project.optional-dependencies]

[dependency-groups]
test = [
    "pytest",
    "tox",
    "tox-uv",
    "ruff",
]
test-sphinx7 = [
    "Sphinx>=7,<8",
]
test-sphinx8 = [
    "Sphinx>=8,<9",
]

[tool.uv]
conflicts = [
    [{group = "test-sphinx7"}, {group = "test-sphinx8"}],
]

[tool.uv.sources]
