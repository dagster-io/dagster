[tox]
requires =
    tox-uv>=1.16
minversion = 4
envlist =
    python3.9-sphinx{7,8}
    python3.10-sphinx{7,8}
    python3.11-sphinx{7,8}
    python3.12-sphinx{7,8}
    python3.13-sphinx{7,8}
    python3.14-sphinx{7,8}


[testenv]
runner = uv-venv-lock-runner
uv_sync_locked = false
uv_sync_flags = --frozen
passenv =
    BUILDKITE*
    PYTEST_ADDOPTS
    PYTEST_PLUGINS

basepython =
    python3.9: python3.9
    python3.10: python3.10
    python3.11: python3.11
    python3.12: python3.12
    python3.13: python3.13
    python3.14: python3.14

dependency_groups =
    test
    sphinx7: test-sphinx7
    sphinx8: test-sphinx8

commands = 
    pytest -v
