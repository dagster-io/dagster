[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "sphinx-click"
version = "0.0.1"
description = "Sphinx extension that automatically documents click applications"
authors = [{name = "Stephen Finucane", email = "stephen@that.guru"}]
license = "MIT"
requires-python = ">=3.8"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Framework :: Sphinx :: Extension",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Documentation",
    "Topic :: Documentation :: Sphinx",
    "Topic :: Utilities",
]

[project.urls]
Homepage = "https://github.com/click-contrib/sphinx-click"
"Bug Tracker" = "https://github.com/click-contrib/sphinx-click/issues"
"Documentation" = "https://sphinx-click.readthedocs.io/en/latest"
"Source Code" = "https://github.com/click-contrib/sphinx-click"

[dependency-groups]
test = [
    "pytest",
    "pytest-cov",
    "coverage",
    "defusedxml",
]
test-click8 = [
    "click>=8.0,<9.0",
]
test-click8-async = [
    "asyncclick>=8.0,<9.0",
]

[tool.uv]
conflicts = [
    [{group = "test-click8"}, {group = "test-click8-async"}],
]

[tool.uv.sources]
