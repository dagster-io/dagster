[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-sphinx"
version = "0.0.1"
requires-python = ">=3.10,<3.15"
description = "Dagster-specific sphinx extension."
authors = [{name = "Elementl", email = "hello@elementl.com"}]
license = "Apache-2.0"
dependencies = [
    "sphinx",
    "sphinx_toolbox",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster"
