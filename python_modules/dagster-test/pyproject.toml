[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-test"
version = "1!0+dev"
description = "A Dagster integration for test"
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster",
    "rich",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-test"

[project.optional-dependencies]
# Eventually we should remove this as an extra and just include it in the main package
pyspark = [
    "pyspark<4",
]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-graphql",
    "dagster-pandas",
    "dagster-aws",
    "dagster-gcp",
    "dagster-k8s",
    "dagster-slack",
    "dagster-celery",
    "dagster-docker",
    "dagster-airflow",
    "dagster-celery-k8s",
    "dagster-celery-docker",
    "dagstermill",
]

[tool.uv.sources]
dagster = { path = "../dagster", editable = true }
dagster-pipes = { path = "../dagster-pipes", editable = true }
dagster-shared = { path = "../libraries/dagster-shared", editable = true }
dagster-graphql = { path = "../dagster-graphql", editable = true }
dagster-pandas = { path = "../libraries/dagster-pandas", editable = true }
dagster-aws = { path = "../libraries/dagster-aws", editable = true }
dagster-gcp = { path = "../libraries/dagster-gcp", editable = true }
dagster-k8s = { path = "../libraries/dagster-k8s", editable = true }
dagster-slack = { path = "../libraries/dagster-slack", editable = true }
dagster-celery = { path = "../libraries/dagster-celery", editable = true }
dagster-docker = { path = "../libraries/dagster-docker", editable = true }
dagster-airflow = { path = "../libraries/dagster-airflow", editable = true }
dagster-celery-k8s = { path = "../libraries/dagster-celery-k8s", editable = true }
dagster-celery-docker = { path = "../libraries/dagster-celery-docker", editable = true }
dagstermill = { path = "../libraries/dagstermill", editable = true }
