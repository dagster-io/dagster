[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-pipes"
version = "1!0+dev"
description = "Toolkit for Dagster integrations with transform logic outside of Dagster"
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/dagster-pipes"

[project.optional-dependencies]
stubs = [
    "google-cloud-storage",
]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-shared",
]

[tool.uv.sources]
dagster = { path = "../dagster", editable = true }
dagster-shared = { path = "../libraries/dagster-shared", editable = true }
