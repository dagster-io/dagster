[tox]
requires =
    tox-uv>=1
skipsdist = True

[testenv]
deps =
  -e .
  -e ../dagster[test]
  -e ../libraries/dagster-shared
download = True
passenv =
    CI_*
    BUILDKITE*
    PYTEST_ADDOPTS
    PYTEST_PLUGINS

allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  pytest -vv ./dagster_pipes_tests
