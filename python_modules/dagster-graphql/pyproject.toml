[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-graphql"
version = "1!0+dev"
description = "The GraphQL API for Dagster."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster==1!0+dev",
    "graphene>=3,<4",
    "gql[requests]>=3,<5",
    "requests",
    "starlette",  # used for run_in_threadpool utility fn
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/dagster-graphql"

[project.scripts]
dagster-graphql = "dagster_graphql.cli:main"

[project.optional-dependencies]
test = ["dagster-test"]
