[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-graphql"
version = "1.13.5rc0"
description = "The GraphQL API for Dagster."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster==1.13.5rc0",
    "graphene>=3,<4",
    "gql[requests]>=3,<5",
    "requests",
    "starlette",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/dagster-graphql"

[project.scripts]
dagster-graphql = "dagster_graphql.cli:main"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-test",
]
test-gql-v3 = [
    "gql[requests]==3.0.0",
]
test-gql-v3-5 = [
    "gql[requests]==3.5.0",
]
test-postgres = [
    "dagster-postgres",
]

[tool.uv]
conflicts = [
    [
        { group = "test-gql-v3" },
        { group = "test-gql-v3-5" },
    ],
]

[tool.uv.sources.dagster]
path = "../dagster"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../libraries/dagster-shared"
editable = true

[tool.uv.sources.dagster-test]
path = "../dagster-test"
editable = true

[tool.uv.sources.dagster-postgres]
path = "../libraries/dagster-postgres"
editable = true
