[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-aws"
version = "1!0+dev"
description = "Package for AWS-specific Dagster framework solid and resource components."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
dependencies = [
    "boto3",
    "dagster==1!0+dev",
    "packaging",
    "requests",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-aws"

[project.entry-points."dagster_dg_cli.registry_modules"]
dagster_aws = "dagster_aws.components"

[project.optional-dependencies]
redshift = [
    "psycopg2-binary",
]
pyspark = [
    "dagster-pyspark",
]
stubs = [
    "boto3-stubs-lite[s3,logs,ecs,glue,emr-serverless,emr,emr-containers]",
]
test = [
    "botocore!=1.32.1",
    "moto[s3,server,glue,emrserverless,logs,emrcontainers]>=2.2.8,<5.0",
    "requests-mock",
    "xmltodict==0.12.0",  # pinned until moto>=3.1.9 (https://github.com/spulec/moto/issues/5112)
    "flaky",
    "pytest-cases",
    "s3fs",
]
