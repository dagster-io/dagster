[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-aws"
version = "1!0+dev"
description = "Package for AWS-specific Dagster framework solid and resource components."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "boto3",
    "dagster==1!0+dev",
    "packaging",
    "requests",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-aws"

[project.entry-points."dagster_dg_cli.registry_modules"]
dagster_aws = "dagster_aws.components"

[project.optional-dependencies]
redshift = [
    "psycopg2-binary",
]
pyspark = [
    "dagster-pyspark",
]
stubs = [
    "boto3-stubs-lite[s3,logs,ecs,glue,emr-serverless,emr,emr-containers]",
]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-test",
    "dagster-pipes",
    "dagster-shared",
    "dagster-spark",
    "dagster-pyspark",
    "botocore!=1.32.1",
    "moto[s3,server,glue,emrserverless,logs,emrcontainers]>=5.0",
    "requests-mock",
    "xmltodict>=0.12.0",
    "pytest-rerunfailures",
    "pytest-cases",
    "s3fs",
]

[tool.uv.sources]
dagster = { path = "../../dagster", editable = true }
dagster-test = { path = "../../dagster-test", editable = true }
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster-shared = { path = "../dagster-shared", editable = true }
dagster-spark = { path = "../dagster-spark", editable = true }
dagster-pyspark = { path = "../dagster-pyspark", editable = true }
