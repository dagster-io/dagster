[tox]
requires =
    tox-uv>=1.16
skipsdist = true

[testenv]
runner = uv-venv-lock-runner
uv_sync_locked = false
uv_sync_flags = --frozen
download = True
setenv =
  SLUGIFY_USES_TEXT_UNIDECODE = yes
passenv =
    HOME
    AIRFLOW_HOME
    AWS_*
    BUILDKITE*
    CI_*
    DAGSTER_*
    DOCKER_*
    GOOGLE_*
    KUBECONFIG,
    POSTGRES_TEST_DB_HOST
    PYTEST_ADDOPTS
    PYTEST_PLUGINS

dependency_groups =
    test
    airflow2: test-airflow2
allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  localdb-airflow2: airflow db init
  default: pytest -m requires_no_db -vv {posargs}
  localdb: pytest -m requires_local_db -vv {posargs}
  persistentdb: pytest -m requires_persistent_db -vv {posargs}

[testenv:mypy]
commands =
  mypy --config=../../../pyproject.toml --non-interactive --install-types {posargs} .
