[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-airflow"
version = "1.13.5"
description = "Airflow plugin for Dagster"
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster==1.13.5",
    "lazy_object_proxy",
    "setuptools<71.0.0",
    "pendulum>=3; python_version>='3.12'",
    "pendulum; python_version<'3.12'",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster"
"project-url/documentation" = "https://docs.dagster.io"

[project.entry-points."airflow.plugins"]
dagster_airflow = "dagster_airflow.__init__:DagsterAirflowPlugin"

[project.entry-points.apache_airflow_provider]
provider_info = "dagster_airflow.__init__:get_provider_info"

[project.optional-dependencies]
kubernetes = [
    "kubernetes>=3.0.0",
    "cryptography>=2.0.0",
]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-test",
    "dagster-aws",
    "dagster-pandas",
    "dagster-gcp",
    "dagster-postgres",
    "connexion<3.0.0",
]
test-airflow2 = [
    "apache-airflow>=2.0.0,<2.8; python_version<'3.12'",
    "pendulum<3.0.0; python_version<'3.12'",
    "boto3>=1.26.7; python_version<'3.12'",
    "flask-session<0.6.0; python_version<'3.12'",
    "kubernetes>=10.0.1; python_version<'3.12'",
    "apache-airflow-providers-docker>=3.2.0,<4; python_version<'3.12'",
    "apache-airflow-providers-apache-spark; python_version<'3.12'",
    "apache-airflow-providers-http<4.1.1; python_version<'3.12'",
]
test-airflow1 = [
    "apache-airflow>=1.0.0,<2.0.0; python_version<'3.12'",
    "boto3>=1.26.7; python_version<'3.12'",
    "kubernetes>=10.0.1; python_version<'3.12'",
    "markupsafe<=2.0.1; python_version<'3.12'",
    "WTForms<3.0.0; python_version<'3.12'",
    "sqlalchemy>=1.0,<1.4.0; python_version<'3.12'",
    "marshmallow-sqlalchemy<0.26.0; python_version<'3.12'",
]

[tool.uv]
conflicts = [
    [
        { group = "test-airflow1" },
        { group = "test-airflow2" },
    ],
]
environments = [
    "python_version >= '3.10' and python_version < '3.12'",
    "python_version >= '3.12' and python_version < '3.15'",
]
dependency-metadata = [
    { name = "apache-airflow", version = "1.10.15", requires-dist = [] },
    { name = "flask-appbuilder", version = "1.13.1", requires-dist = [] },
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true

[tool.uv.sources.dagster-test]
path = "../../dagster-test"
editable = true

[tool.uv.sources.dagster-aws]
path = "../dagster-aws"
editable = true

[tool.uv.sources.dagster-pandas]
path = "../dagster-pandas"
editable = true

[tool.uv.sources.dagster-gcp]
path = "../dagster-gcp"
editable = true

[tool.uv.sources.dagster-postgres]
path = "../dagster-postgres"
editable = true
