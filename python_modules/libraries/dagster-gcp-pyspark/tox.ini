[tox]
requires =
    tox-uv>=1
skipsdist = True

[testenv]
extras =
  test
download = True
passenv =
    CI_*
    BUILDKITE*
    AZURE_*
    SSH_*
    GOOGLE_APPLICATION_CREDENTIALS
    GCP_PROJECT_ID
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
deps =
  -e ../../dagster[test]
  -e ../../dagster-test
  -e ../../dagster-pipes
  -e ../dagster-shared
  -e ../dagster-pandas
  -e ../dagster-gcp
  -e .[test]
allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  pytest -vv ./dagster_gcp_pyspark_tests
