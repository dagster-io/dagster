[tox]
requires =
    tox-uv>=1.16
skipsdist = True

[testenv]
runner = uv-venv-lock-runner
uv_sync_locked = false
uv_sync_flags = --frozen
download = True
passenv =
    CI_*
    BUILDKITE*
    AZURE_*
    SSH_*
    GOOGLE_APPLICATION_CREDENTIALS
    GCP_PROJECT_ID
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
dependency_groups =
    test
allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  pytest -vv ./dagster_gcp_pyspark_tests
