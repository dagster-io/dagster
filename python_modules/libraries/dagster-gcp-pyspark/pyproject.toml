[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-gcp-pyspark"
version = "0.29.5"
description = "Package for storing PySpark DataFrames in GCP"
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster==1.13.5",
    "dagster-gcp==0.29.5",
    "pyspark>=4.1; python_version>='3.14'",
    "pyspark>=3.5,<4; python_version<'3.14'",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-gcp-pyspark"

[project.optional-dependencies]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-test",
    "dagster-pipes",
    "dagster-shared",
    "dagster-pandas",
    "dagster-gcp",
    "pandas-gbq",
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-test]
path = "../../dagster-test"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true

[tool.uv.sources.dagster-pandas]
path = "../dagster-pandas"
editable = true

[tool.uv.sources.dagster-gcp]
path = "../dagster-gcp"
editable = true
