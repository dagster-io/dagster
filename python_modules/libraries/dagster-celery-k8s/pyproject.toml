[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-celery-k8s"
version = "0.29.5"
description = "A Dagster integration for celery-k8s-executor"
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster==1.13.5",
    "dagster-k8s==0.29.5",
    "dagster-celery==0.29.5",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-celery-k8s"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-graphql",
    "dagster-test",
    "dagster-pandas",
    "dagster-k8s",
    "dagster-celery",
    "dagster-celery-docker",
    "dagster-docker",
    "dagster-postgres",
    "dagster-aws",
    "dagster-gcp",
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true

[tool.uv.sources.dagster-graphql]
path = "../../dagster-graphql"
editable = true

[tool.uv.sources.dagster-test]
path = "../../dagster-test"
editable = true

[tool.uv.sources.dagster-pandas]
path = "../dagster-pandas"
editable = true

[tool.uv.sources.dagster-k8s]
path = "../dagster-k8s"
editable = true

[tool.uv.sources.dagster-celery]
path = "../dagster-celery"
editable = true

[tool.uv.sources.dagster-celery-docker]
path = "../dagster-celery-docker"
editable = true

[tool.uv.sources.dagster-docker]
path = "../dagster-docker"
editable = true

[tool.uv.sources.dagster-postgres]
path = "../dagster-postgres"
editable = true

[tool.uv.sources.dagster-aws]
path = "../dagster-aws"
editable = true

[tool.uv.sources.dagster-gcp]
path = "../dagster-gcp"
editable = true
