[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster_powerbi"
version = "1!0+dev"
description = "Build assets representing Power BI dashboards and reports."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1!0+dev",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-powerbi"

[project.entry-points."dagster_dg.plugin"]
dagster_powerbi = "dagster_powerbi"

[project.optional-dependencies]

[dependency-groups]
test = [
    "dagster-pipes",
    "dagster[test]",
    "dagster-test",
    "dagster-shared",
    "dagster-dg-cli",
    "dagster-dg-core[test]",
    "dagster-cloud-cli",
    "dagster-rest-resources",
    "create-dagster",
    "dagster-graphql",
    "dagster-dg-core[test]==1!0+dev",
    "dagster-dg-cli==1!0+dev",
]

[tool.uv.sources]
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster = { path = "../../dagster", editable = true }
dagster-test = { path = "../../dagster-test", editable = true }
dagster-shared = { path = "../dagster-shared", editable = true }
dagster-dg-cli = { path = "../dagster-dg-cli", editable = true }
dagster-dg-core = { path = "../dagster-dg-core", editable = true }
dagster-cloud-cli = { path = "../dagster-cloud-cli", editable = true }
dagster-rest-resources = { path = "../dagster-rest-resources", editable = true }
create-dagster = { path = "../create-dagster", editable = true }
dagster-graphql = { path = "../../dagster-graphql", editable = true }
