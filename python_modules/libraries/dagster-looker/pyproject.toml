[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster_looker"
version = "0.29.6"
requires-python = ">=3.10,<3.15"
description = ""
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
dependencies = [
    "dagster==1.13.6",
    "lkml",
    "looker_sdk<24.18.0",
    "sqlglot>=25.19.0",
    "python-liquid<2",
    "cattrs<23.2",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-looker"

[dependency-groups]
test = [
    "dagster-pipes",
    "dagster-shared",
    "dagster[test]",
]

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true
