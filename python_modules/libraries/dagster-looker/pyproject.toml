[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster_looker"
version = "1!0+dev"
requires-python = ">=3.10,<3.15"
description = ""
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
dependencies = [
    "dagster==1!0+dev",
    "lkml",
    # Remove pin after resolution of: https://github.com/looker-open-source/sdk-codegen/issues/1518
    "looker_sdk<24.18.0",
    # Dialect.SET_OP_DISTINCT_BY_DEFAULT was introduced in version 25.19.0:
    # https://github.com/tobymao/sqlglot/blob/v25.19.0/sqlglot/dialects/dialect.py
    "sqlglot>=25.19.0",
    "python-liquid<2",
    "cattrs<23.2",  # https://github.com/looker-open-source/sdk-codegen/issues/1410
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-looker"

[dependency-groups]
test = [
    "dagster-pipes",
    "dagster-shared",
    "dagster[test]",
]

[tool.uv.sources]
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster-shared = { path = "../dagster-shared", editable = true }
dagster = { path = "../../dagster", editable = true }
