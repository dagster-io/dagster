[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-hightouch"
version = "0.29.7"
description = "Package for integrating Hightouch with Dagster."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.14"
dependencies = [
    "dagster==1.13.7",
    "requests",
    "python-dateutil",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-hightouch"

[project.entry-points."dagster_dg_cli.registry_modules"]
dagster_hightouch = "dagster_hightouch"
