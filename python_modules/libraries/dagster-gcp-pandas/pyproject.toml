[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-gcp-pandas"
version = "1!0+dev"
description = "Package for storing Pandas DataFrames in GCP."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1!0+dev",
    "dagster-gcp==1!0+dev",
    "pandas<3.0.0",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-gcp-pandas"

[project.optional-dependencies]

[dependency-groups]
test = [
    "dagster[mypy,test]",
    "dagster-test",
    "dagster-pipes",
    "dagster-shared",
    "dagster-pandas",
    "dagster-gcp",
    "pandas-gbq",
]

[tool.uv.sources]
dagster = { path = "../../dagster", editable = true }
dagster-test = { path = "../../dagster-test", editable = true }
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster-shared = { path = "../dagster-shared", editable = true }
dagster-pandas = { path = "../dagster-pandas", editable = true }
dagster-gcp = { path = "../dagster-gcp", editable = true }
