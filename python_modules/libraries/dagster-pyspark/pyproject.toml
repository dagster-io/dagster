[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-pyspark"
version = "1!0+dev"
description = "Package for PySpark Dagster framework components."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster==1!0+dev",
    "dagster_spark==1!0+dev",
    "pyspark>=3,<5",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/dagster-framework/pyspark"
