[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-pyspark"
version = "1!0+dev"
description = "Package for PySpark Dagster framework components."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1!0+dev",
    "dagster_spark==1!0+dev",
    "pyspark>=3,<5",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/dagster-framework/pyspark"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-spark",
    "dagster-aws",
    "dagster-shared",
]

[tool.uv.sources]
dagster = { path = "../../dagster", editable = true }
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster-spark = { path = "../dagster-spark", editable = true }
dagster-aws = { path = "../dagster-aws", editable = true }
dagster-shared = { path = "../dagster-shared", editable = true }
