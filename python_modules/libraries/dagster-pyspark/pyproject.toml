[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-pyspark"
version = "0.29.5rc0"
description = "Package for PySpark Dagster framework components."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster==1.13.5rc0",
    "dagster-spark==0.29.5rc0",
    "pyspark>=3,<5",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/dagster-framework/pyspark"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-spark",
    "dagster-aws",
    "dagster-shared",
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-spark]
path = "../dagster-spark"
editable = true

[tool.uv.sources.dagster-aws]
path = "../dagster-aws"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true
