[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-dlt"
version = "0.29.8"
description = "Package for performing ETL/ELT tasks with dlt in Dagster."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1.13.8",
    "dlt>=0.4",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-dlt"

[project.entry-points."dagster_dg_cli.registry_modules"]
dagster_dlt = "dagster_dlt"

[project.optional-dependencies]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-test",
    "create-dagster",
    "dagster-dg-cli",
    "dagster-dg-core[test]",
    "dagster-cloud-cli",
    "dagster-rest-resources",
    "dagster-pipes",
    "dagster-graphql",
    "dagster-shared",
    "duckdb",
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-test]
path = "../../dagster-test"
editable = true

[tool.uv.sources.create-dagster]
path = "../../libraries/create-dagster"
editable = true

[tool.uv.sources.dagster-dg-cli]
path = "../../libraries/dagster-dg-cli"
editable = true

[tool.uv.sources.dagster-dg-core]
path = "../../libraries/dagster-dg-core"
editable = true

[tool.uv.sources.dagster-cloud-cli]
path = "../../libraries/dagster-cloud-cli"
editable = true

[tool.uv.sources.dagster-rest-resources]
path = "../../libraries/dagster-rest-resources"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-graphql]
path = "../../dagster-graphql"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true
