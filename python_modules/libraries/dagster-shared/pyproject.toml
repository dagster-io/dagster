[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-shared"
version = "1!0+dev"
description = "Shared code between dagster and dagster-dg-core."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "PyYAML>=5.1",
    "packaging>=20.9",
    "platformdirs",
    "pydantic>=2,<3.0.0",
    "typing_extensions>=4.11.0,<5",
    "tomlkit",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-shared"

[project.optional-dependencies]

[dependency-groups]
test = [
    "pytest",
    "pytest-rerunfailures",
]

[tool.uv.sources]
