[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster_omni"
version = "1!0+dev"
requires-python = ">=3.10,<3.15"
description = "Package for integrating Omni with Dagster."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
dependencies = [
    "dagster==1!0+dev",
    "aiohttp",
    "python-dateutil",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-omni"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-graphql",
    "dagster-pipes",
    "dagster-shared",
]

[tool.uv.sources]
dagster = { path = "../../dagster", editable = true }
dagster-graphql = { path = "../../dagster-graphql", editable = true }
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster-shared = { path = "../../libraries/dagster-shared", editable = true }
