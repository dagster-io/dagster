[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-cloud-cli"
version = "1!0+dev"
description = ""
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster-shared",
    "packaging>=20.9",
    "questionary",
    "requests",
    "typer>=0.15.0",
    "click",
    "PyYAML>=5.1",
    "github3.py",
    "Jinja2",
    "setuptools",
    "tomli>=1.1.0;python_version<\"3.11\"",
    "validators",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-cloud-cli"

[project.scripts]
dagster-cloud = "dagster_cloud_cli.entrypoint:app"
dagster-plus = "dagster_cloud_cli.entrypoint:app"

[project.optional-dependencies]
test = [
    "freezegun",
    "pytest>=8",
    "pytest-mock==3.14.0",
    "flaky",
    "pex>=2.1.132,<2.60.0",
    # Tests exercise the production code path in `pex_builder/source.py` that
    # shells out to `python -m pip install --target ...` to build pyproject
    # projects, so the test interpreter must have pip importable. Declared
    # explicitly because uv-created venvs (tox-uv) don't seed pip by default.
    "pip",
]
