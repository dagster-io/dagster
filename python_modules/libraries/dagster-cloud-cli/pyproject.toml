[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-cloud-cli"
version = "1!0+dev"
requires-python = ">=3.10,<3.15"
description = ""
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
dependencies = [
    "dagster-shared",
    "packaging>=20.9",
    "questionary",
    "requests",
    "typer>=0.15.0",
    "click",
    "PyYAML>=5.1",
    "github3.py",
    "Jinja2",
    "setuptools",
    "tomli>=1.1.0;python_version<\"3.11\"",
    "validators",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-cloud-cli"

[project.scripts]
dagster-cloud = "dagster_cloud_cli.entrypoint:app"
dagster-plus = "dagster_cloud_cli.entrypoint:app"

[project.optional-dependencies]

[dependency-groups]
test = [
    "dagster-shared",
    "freezegun",
    "pytest>=8",
    "pytest-mock==3.14.0",
    "pytest-rerunfailures",
    "pex>=2.1.132,<2.60.0",
    "pip",
]

[tool.uv.sources]
dagster-shared = { path = "../../../python_modules/libraries/dagster-shared", editable = true }
