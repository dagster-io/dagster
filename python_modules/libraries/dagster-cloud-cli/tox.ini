[tox]
requires =
    tox-uv>=1.16
envlist=py311
skipsdist = True

[testenv]
runner = uv-venv-lock-runner
uv_sync_locked = false
uv_sync_flags = --frozen
download = True
setenv =
  DD_DOGSTATSD_DISABLE = true
passenv =
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
    CI_*
    BUILDKITE*
    SNOWFLAKE_ACCOUNT
    SNOWFLAKE_USER
    SNOWFLAKE_PASSWORD
    DOCKER_CONFIG
    POSTGRES_TEST_DB_HOST
    POSTGRES_FUNCTION_SCOPED_TEST_DB_HOST
    UV_CACHE_DIR
    DAGSTER_INTERNAL_GIT_REPO_DIR
dependency_groups =
    test
allowlist_externals =
  /bin/bash
  echo
  uv
commands =
  /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  pytest -vv --durations 10 {posargs}
