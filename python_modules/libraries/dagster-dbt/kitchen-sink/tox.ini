[tox]
requires =
    tox-uv>=1
skipsdist = true

[testenv]
download = True
passenv =
    CI_*
    BUILDKITE*
    KS_DBT_CLOUD*
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
deps =
  -e ../../../dagster[test]
  -e ../../../dagster-webserver
  -e ../../../dagster-test
  -e ../../../dagster-pipes
  -e ../../../dagster-graphql
  -e ../../dagster-shared
  -e ../../dagster-pandas
  -e ../../dagster-dbt
  -e .
allowlist_externals =
  /bin/bash
  uv
  just
commands =
  # We need to rebuild the UI to ensure that the dagster-webserver can run
  just -f ../../../../justfile rebuild_ui
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  pytest ./dagster_dbt_cloud_kitchen_sink_tests --snapshot-warn-unused -vv {posargs}
