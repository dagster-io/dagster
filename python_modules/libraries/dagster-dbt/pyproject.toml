[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-dbt"
version = "1!0+dev"
description = "A Dagster integration for dbt"
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.14"
dependencies = [
    "dagster==1!0+dev",
    # Follow the version support constraints for dbt Core:
    # https://docs.getdbt.com/docs/dbt-versions/core
    "dbt-core>=1.7,<1.12",
    "gitpython",
    "Jinja2",
    "networkx",
    "orjson",
    "requests",
    "rich",
    "sqlglot[rs]<28.1.0",  # FW-731
    "typer>=0.9.0",
    "packaging",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-dbt"

[project.scripts]
dagster-dbt-cloud = "dagster_dbt.cloud.cli:app"
dagster-dbt = "dagster_dbt.cli.app:app"

[project.entry-points."dagster_dg_cli.registry_modules"]
dagster_dbt = "dagster_dbt"

[dependency-groups]
# Base test deps installed for every test env. The pre-migration tox.ini
# had a `!dbtfusion: -e .[test]` / `dbtfusion: -e .[test-bare]` split so
# fusion envs skipped the duckdb deps; that subset behavior is dropped
# here — fusion envs now install the duckdb deps too (harmless extra).
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-dg-cli",
    "dagster-dg-core",
    "dagster-cloud-cli",
    "dagster-rest-resources",
    "dagster-duckdb",
    "dagster-duckdb-pandas",
    "pytest-rerunfailures",
    "pytest-order",
    "dbt-duckdb<1.9.2",  # concurrency issues
    "duckdb<1.4.0",  # compat issues
]
# dbt-core 1.7.x / 1.8.x pin protobuf<5 internally. dagster's runtime
# requires grpcio>=1.66.2 on py>=3.13 (which transitively requires
# protobuf>=5.26), so the dbt17/18 forks are only feasible on py<3.13.
# The python_version marker scopes the constraints accordingly. The
# `[tool.uv].environments` split below is what makes uv evaluate these
# marker-scoped caps cleanly per Python band — see the bug report at
# reports/2026-05-13-uv-disjoint-markers-conflict-resolver-bug.md.
test-dbt17 = [
    "dbt-core==1.7.*,>=1.7.10; python_version<'3.13'",
    "dbt-duckdb==1.7.*; python_version<'3.13'",
    "dbt-snowflake==1.7.*; python_version<'3.13'",
    "dbt-bigquery==1.7.*; python_version<'3.13'",
    "grpcio-health-checking<1.62; python_version<'3.13'",
    "grpcio<1.62; python_version<'3.13'",
    "grpcio-tools<1.62; python_version<'3.13'",
]
test-dbt18 = [
    "dbt-core==1.8.*; python_version<'3.13'",
    "dbt-duckdb==1.8.*; python_version<'3.13'",
    "dbt-snowflake==1.8.*; python_version<'3.13'",
    "dbt-bigquery==1.8.*; python_version<'3.13'",
    "grpcio-health-checking<1.62; python_version<'3.13'",
    "grpcio<1.62; python_version<'3.13'",
    "grpcio-tools<1.62; python_version<'3.13'",
]
# dbt-core 1.9+ allows protobuf>=5, so these factor groups co-resolve
# cleanly with dagster's runtime grpcio chain on all Python versions.
test-dbt19 = [
    "dbt-core==1.9.*",
    "dbt-duckdb==1.9.*",
    "dbt-snowflake==1.9.*",
    "dbt-bigquery==1.9.*",
]
test-dbt110 = [
    "dbt-core==1.10.*",
]
test-dbt111 = [
    "dbt-core==1.11.*",
]

[tool.uv]
conflicts = [
    [
        {group = "test-dbt17"},
        {group = "test-dbt18"},
        {group = "test-dbt19"},
        {group = "test-dbt110"},
        {group = "test-dbt111"},
    ],
]
# Explicitly enumerate the Python environments uv should resolve for.
# Splitting into a <3.13 environment and a >=3.13 environment lets uv
# evaluate the test-dbt17/18 marker-scoped grpcio caps independently
# in each environment instead of unifying them across forks (which
# triggers a uv resolver bug — see
# reports/2026-05-13-uv-disjoint-markers-conflict-resolver-bug.md).
environments = [
    "python_version >= '3.10' and python_version < '3.13'",
    "python_version >= '3.13' and python_version < '3.14'",
]

[tool.uv.sources]
dagster = { path = "../../dagster", editable = true }
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster-shared = { path = "../dagster-shared", editable = true }
dagster-dg-cli = { path = "../dagster-dg-cli", editable = true }
dagster-dg-core = { path = "../dagster-dg-core", editable = true }
dagster-cloud-cli = { path = "../dagster-cloud-cli", editable = true }
dagster-rest-resources = { path = "../dagster-rest-resources", editable = true }
dagster-duckdb = { path = "../dagster-duckdb", editable = true }
dagster-duckdb-pandas = { path = "../dagster-duckdb-pandas", editable = true }
