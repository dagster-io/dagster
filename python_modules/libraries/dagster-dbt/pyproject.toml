[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-dbt"
version = "0.29.6"
description = "A Dagster integration for dbt"
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.14"
dependencies = [
    "dagster==1.13.6",
    "dbt-core>=1.7,<1.12",
    "gitpython",
    "Jinja2",
    "networkx",
    "orjson",
    "requests",
    "rich",
    "sqlglot[rs]<28.1.0",
    "typer>=0.9.0",
    "packaging",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-dbt"

[project.scripts]
dagster-dbt-cloud = "dagster_dbt.cloud.cli:app"
dagster-dbt = "dagster_dbt.cli.app:app"

[project.entry-points."dagster_dg_cli.registry_modules"]
dagster_dbt = "dagster_dbt"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-dg-cli",
    "dagster-dg-core",
    "dagster-cloud-cli",
    "dagster-rest-resources",
    "dagster-duckdb",
    "dagster-duckdb-pandas",
    "pytest-rerunfailures",
    "pytest-order",
    "dbt-duckdb<1.9.2",
    "duckdb<1.4.0",
]
test-dbt17 = [
    "dbt-core==1.7.*,>=1.7.10; python_version<'3.13'",
    "dbt-duckdb==1.7.*; python_version<'3.13'",
    "dbt-snowflake==1.7.*; python_version<'3.13'",
    "dbt-bigquery==1.7.*; python_version<'3.13'",
    "grpcio-health-checking<1.62; python_version<'3.13'",
    "grpcio<1.62; python_version<'3.13'",
    "grpcio-tools<1.62; python_version<'3.13'",
]
test-dbt18 = [
    "dbt-core==1.8.*; python_version<'3.13'",
    "dbt-duckdb==1.8.*; python_version<'3.13'",
    "dbt-snowflake==1.8.*; python_version<'3.13'",
    "dbt-bigquery==1.8.*; python_version<'3.13'",
    "grpcio-health-checking<1.62; python_version<'3.13'",
    "grpcio<1.62; python_version<'3.13'",
    "grpcio-tools<1.62; python_version<'3.13'",
]
test-dbt19 = [
    "dbt-core==1.9.*",
    "dbt-duckdb==1.9.*",
    "dbt-snowflake==1.9.*",
    "dbt-bigquery==1.9.*",
]
test-dbt110 = [
    "dbt-core==1.10.*",
]
test-dbt111 = [
    "dbt-core==1.11.*",
]

[tool.uv]
conflicts = [
    [
        { group = "test-dbt17" },
        { group = "test-dbt18" },
        { group = "test-dbt19" },
        { group = "test-dbt110" },
        { group = "test-dbt111" },
    ],
]
environments = [
    "python_version >= '3.10' and python_version < '3.13'",
    "python_version >= '3.13' and python_version < '3.14'",
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true

[tool.uv.sources.dagster-dg-cli]
path = "../dagster-dg-cli"
editable = true

[tool.uv.sources.dagster-dg-core]
path = "../dagster-dg-core"
editable = true

[tool.uv.sources.dagster-cloud-cli]
path = "../dagster-cloud-cli"
editable = true

[tool.uv.sources.dagster-rest-resources]
path = "../dagster-rest-resources"
editable = true

[tool.uv.sources.dagster-duckdb]
path = "../dagster-duckdb"
editable = true

[tool.uv.sources.dagster-duckdb-pandas]
path = "../dagster-duckdb-pandas"
editable = true
