[tox]
requires =
    tox-uv>=1.16
skipsdist = true

# CI test matrix is defined via tox factors (dependency_groups + commands) below,
# then sharded by Buildkite. Source of truth for the full matrix and shard count
# is the `dagster-dbt` PackageSpec in
# dagster-oss/.buildkite/dagster-buildkite/dagster_buildkite/steps/packages.py.

[testenv]
runner = uv-venv-lock-runner
uv_sync_locked = false
uv_sync_flags = --frozen
download = True
passenv =
    CI_*
    BUILDKITE*
    SNOWFLAKE_ACCOUNT
    SNOWFLAKE_USER
    SNOWFLAKE_DEMO_PRIVATE_KEY
    SNOWFLAKE_BUILDKITE_PRIVATE_KEY
    GOOGLE_APPLICATION_CREDENTIALS
    GCP_PROJECT_ID
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
dependency_groups =
    test
    dbt17: test-dbt17
    dbt18: test-dbt18
    dbt19: test-dbt19
    dbt110: test-dbt110
    dbt111: test-dbt111
allowlist_externals =
  /bin/bash
  uv
commands =
  dbtfusion: /bin/bash -c 'sh dagster_dbt_tests/install_dbt_fusion.sh --to {envbindir} --version 2.0.0-preview.120; export PATH={envbindir}:$PATH'
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  cloud: pytest --ignore=./kitchen-sink --durations 10  --reruns 3 -m "cloud" -vv {posargs}
  core-main: pytest --ignore=./kitchen-sink --durations 10  -m "core and not snowflake and not bigquery and not derived_metadata and not fusion" -vv {posargs}
  core-derived-metadata: pytest --ignore=./kitchen-sink --durations 10 --reruns 3 -m "derived_metadata and not snowflake and not bigquery and not fusion" -vv {posargs}
  dbtfusion-snowflake: pytest --ignore=./kitchen-sink -vv --durations 10 {posargs} -m 'fusion'
  bigquery: pytest --ignore=./kitchen-sink -vv --durations 10 {posargs} -m 'bigquery'
