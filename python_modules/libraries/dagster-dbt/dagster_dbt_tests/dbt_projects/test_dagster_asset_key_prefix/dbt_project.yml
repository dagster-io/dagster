name: "test_dagster_asset_key_prefix"

config-version: 2
version: "0.1"

profile: "jaffle_shop"

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analysis"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_modules"
  - "logs"

require-dbt-version: [">=1.0.0", "<2.0.0"]

models:
  test_dagster_asset_key_prefix:
    +meta:
      dagster:
        asset_key_prefix: ["warehouse", "jaffle_shop"]

sources:
  test_dagster_asset_key_prefix:
    +meta:
      dagster:
        asset_key_prefix: ["staging"]
