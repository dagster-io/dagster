selectors:
  - name: raw_customer_child_models
    description: "Equivalent to raw_customers+,resource_type:model"
    definition:
      intersection:
        - method: resource_type
          value: model
        - raw_customers+
  - name: select_with_fqn
    description: "Selects all resources by fully qualified name."
    definition:
      method: fqn
      value: "*"
  - name: select_with_path
    description: "Selects all resources by path."
    definition:
      method: path
      value: "*"
