[tox]
requires =
    tox-uv>=1
skipsdist = true

[testenv]
download = True
passenv =
    HOME
    CI_PULL_REQUEST
    DASK_ADDRESS
    AWS_*
    BUILDKITE*
    DAGSTER_*
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
deps =
  -e ../../dagster[test]
  -e ../../dagster-pipes
  -e ../dagster-shared
  -e ../../dagster-graphql
  -e ../../dagster-test
  -e ../dagster-postgres
  -e ../dagster-k8s
  -e ../dagster-aws
  -e ../dagster-pandas
  -e ../dagster-gcp
  -e ../dagster-celery-k8s
  -e ../dagster-celery-docker
  -e .
allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  pytest -vv {posargs} -s
