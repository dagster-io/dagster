[build-system]
requires = ["maturin>=1.9,<2"]
build-backend = "maturin"

[project]
name = "dagster-cron-native"
version = "1!0+dev"
description = "Rust-backed cron schedule iteration for Dagster."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Rust",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-cron-native"

[dependency-groups]
test = [
    "croniter",
    "maturin>=1.9,<2",
    "pytest",
    "python-dateutil",
    "pytz",
]

[tool.maturin]
module-name = "dagster_cron_native._native"
python-source = "python"
features = ["pyo3/extension-module"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"

[tool.ruff]
line-length = 99
target-version = "py310"
