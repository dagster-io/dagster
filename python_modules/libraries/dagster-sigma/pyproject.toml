[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster_sigma"
version = "1!0+dev"
description = "Build assets representing Sigma dashboards."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1!0+dev",
    "sqlglot",
    "aiohttp",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-sigma"

[project.scripts]
dagster-sigma = "dagster_sigma.cli:app"

[project.optional-dependencies]

[dependency-groups]
test = [
    "dagster-pipes",
    "dagster[test]",
    "dagster-shared",
    "aioresponses",
]

[tool.uv.sources]
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster = { path = "../../dagster", editable = true }
dagster-shared = { path = "../dagster-shared", editable = true }
