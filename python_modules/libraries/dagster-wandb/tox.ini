[tox]
requires =
    tox-uv>=1
skipsdist = True

[testenv]
extras =
  test
download = True
passenv =
    CI_*
    BUILDKITE*
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
deps =
  -e ../dagster-wandb[dev]
  -e ../../dagster[test]
  -e ../../dagster-pipes
  -e ../dagster-shared
allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  pytest -vv ./dagster_wandb_tests
