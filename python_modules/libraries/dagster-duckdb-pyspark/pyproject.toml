[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-duckdb-pyspark"
version = "0.29.7"
description = "Package for storing PySpark DataFrames in DuckDB."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1.13.7",
    "dagster-duckdb==0.29.7",
    "pyspark>=4.1; python_version>='3.14'",
    "pyspark>=3.5,<4; python_version<'3.14'",
    "pandas<3.0.0",
    "pyarrow",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-duckb-pyspark"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-duckdb",
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true

[tool.uv.sources.dagster-duckdb]
path = "../dagster-duckdb"
editable = true
