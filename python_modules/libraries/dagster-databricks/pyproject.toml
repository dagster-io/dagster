[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-databricks"
version = "0.29.6"
description = "Package for Databricks-specific Dagster framework op and resource components."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1.13.6",
    "dagster-pipes==1.13.6",
    "dagster-pyspark==0.29.6",
    "aiohttp",
    "databricks-sdk>=0.41,<0.61.0",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-databricks"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-aws",
    "dagster-azure",
    "dagster-spark",
    "dagster-pyspark",
    "build",
]
test-pydantic1 = [
    "pydantic!=1.10.7,<2.0.0",
]
test-pydantic2 = [
    "pydantic>=2.0.0",
]

[tool.uv]
conflicts = [
    [
        { group = "test-pydantic1" },
        { group = "test-pydantic2" },
    ],
]
override-dependencies = [
    "pydantic",
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true

[tool.uv.sources.dagster-aws]
path = "../dagster-aws"
editable = true

[tool.uv.sources.dagster-azure]
path = "../dagster-azure"
editable = true

[tool.uv.sources.dagster-spark]
path = "../dagster-spark"
editable = true

[tool.uv.sources.dagster-pyspark]
path = "../dagster-pyspark"
editable = true
