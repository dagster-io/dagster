[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-databricks"
version = "0.28.17rc0"
description = "Package for Databricks-specific Dagster framework op and resource components."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster==1.12.17rc0",
    "dagster-pipes==1.12.17rc0",
    "dagster-pyspark==0.28.17rc0",
    "aiohttp",
    "databricks-sdk>=0.41,<0.61.0",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-databricks"
