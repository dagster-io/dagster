[tox]
requires =
    tox-uv>=1.16
skipsdist = true

[testenv]
runner = uv-venv-lock-runner
uv_sync_locked = false
uv_sync_flags = --frozen
download = True
passenv =
    CI_*
    DATABRICKS_*
    BUILDKITE*
    SSH_*
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
dependency_groups =
    test
    pydantic1: test-pydantic1
    pydantic2: test-pydantic2
allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  pytest -vv {posargs}
