[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagstermill"
version = "0.29.8"
description = "run notebooks using the Dagster tools"
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1.13.8",
    "ipykernel>=4.9.0,!=5.4.0,!=5.4.1",
    "ipython_genutils>=0.2.0",
    "packaging>=20.9",
    "papermill>=2.0.0",
    "scrapbook>=0.5.0",
    "nbconvert",
    "jupyter-client<8",
]

[project.scripts]
dagstermill = "dagstermill.cli:main"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-pandas",
    "matplotlib",
    "scikit-learn>=0.19.0",
    "tqdm",
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true

[tool.uv.sources.dagster-pandas]
path = "../dagster-pandas"
editable = true
