[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagstermill"
version = "1!0+dev"
description = "run notebooks using the Dagster tools"
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1!0+dev",
    # ipykernel 5.4.0 and 5.4.1 broke papermill
    # see https://github.com/dagster-io/dagster/issues/3401,
    # https://github.com/nteract/papermill/issues/519,
    # https://github.com/ipython/ipykernel/issues/568
    "ipykernel>=4.9.0,!=5.4.0,!=5.4.1",
    # See: https://github.com/mu-editor/mu/pull/1844
    # ipykernel<6 depends on ipython_genutils, but it isn't explicitly
    # declared as a dependency. It also depends on traitlets, which
    # incidentally brought ipython_genutils, but in v5.1 it was dropped, so as
    # a workaround we need to manually specify it here
    "ipython_genutils>=0.2.0",
    "packaging>=20.9",
    "papermill>=2.0.0",
    "scrapbook>=0.5.0",
    "nbconvert",
    "jupyter-client<8",  # jupyter-client 8 causing test hangs
]

[project.scripts]
dagstermill = "dagstermill.cli:main"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-pandas",
    "matplotlib",
    "scikit-learn>=0.19.0",
    "tqdm",
]

[tool.uv.sources]
dagster = { path = "../../dagster", editable = true }
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster-shared = { path = "../dagster-shared", editable = true }
dagster-pandas = { path = "../dagster-pandas", editable = true }
