[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-mysql"
version = "0.29.7"
description = "A Dagster integration for MySQL"
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.14"
dependencies = [
    "dagster==1.13.7",
    "mysql-connector-python",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-mysql"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-test",
    "dagster-pipes",
    "dagster-shared",
]
test-sqlalchemy-1-3 = [
    "sqlalchemy<1.4",
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-test]
path = "../../dagster-test"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true
