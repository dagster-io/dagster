[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster_polytomic"
version = "1!0+dev"
description = "Package for integrating Polytomic with Dagster."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1!0+dev",
    "polytomic>=1.11.3",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-polytomic"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-managed-elements",
    "create-dagster",
    "dagster-dg-cli",
    "dagster-dg-core[test]",
    "dagster-cloud-cli",
    "dagster-rest-resources",
    "dagster-graphql",
]

[tool.uv.sources]
dagster = { path = "../../dagster", editable = true }
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster-shared = { path = "../dagster-shared", editable = true }
dagster-managed-elements = { path = "../dagster-managed-elements", editable = true }
create-dagster = { path = "../create-dagster", editable = true }
dagster-dg-cli = { path = "../dagster-dg-cli", editable = true }
dagster-dg-core = { path = "../dagster-dg-core", editable = true }
dagster-cloud-cli = { path = "../dagster-cloud-cli", editable = true }
dagster-rest-resources = { path = "../dagster-rest-resources", editable = true }
dagster-graphql = { path = "../../dagster-graphql", editable = true }
