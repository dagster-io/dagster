[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-dask"
version = "1!0+dev"
description = "Package for using Dask as Dagster's execution engine."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "bokeh",
    "dagster==1!0+dev",
    "dask[dataframe]>=1.2.2",
    "distributed>=1.28.1",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-dask"

[project.optional-dependencies]
yarn = [
    "dask-yarn",
]
pbs = [
    "dask-jobqueue",
]
kube = [
    "dask-kubernetes<=2022.9.0",
]
# we need pyarrow for testing read/write parquet files.

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-graphql",
    "dagster-aws",
    "dagster-pandas",
    "pyarrow",
]

[tool.uv.sources]
dagster = { path = "../../dagster", editable = true }
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster-shared = { path = "../dagster-shared", editable = true }
dagster-graphql = { path = "../../dagster-graphql", editable = true }
dagster-aws = { path = "../dagster-aws", editable = true }
dagster-pandas = { path = "../dagster-pandas", editable = true }
