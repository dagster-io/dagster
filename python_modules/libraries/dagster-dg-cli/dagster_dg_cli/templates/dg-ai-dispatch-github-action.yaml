name: dg-ai-dispatch
run-name: "dg-ai-dispatch${{ inputs.plan_only && '(plan)' || '' }}:#${{ inputs.pr_number }}:${{ inputs.distinct_id }}"

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: "Branch to work on (created by CLI command)"
        required: true
        type: string
      pr_number:
        description: "Draft PR number (created by CLI command)"
        required: true
        type: string
      submitted_by:
        description: "GitHub username of the person who submitted"
        required: true
        type: string
      distinct_id:
        description: "Unique identifier for run discovery (base36)"
        required: true
        type: string
      model_name:
        description: "Claude model to use for execution"
        required: false
        type: string
        default: "claude-opus-4-6"
      plan_only:
        description: "If true, only run the plan phase, skip implementation"
        required: false
        type: boolean
        default: false

concurrency:
  group: dg-ai-dispatch-${{ inputs.branch_name }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  plan:
    if: vars.CLAUDE_ENABLED != 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate Claude credentials
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error title=Missing Secret::ANTHROPIC_API_KEY must be configured"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "${{ inputs.submitted_by }}"
          git config user.email "${{ inputs.submitted_by }}@users.noreply.github.com"

      - name: Checkout implementation branch
        env:
          BRANCH_NAME: ${{ inputs.branch_name }}
        run: |
          git fetch origin "$BRANCH_NAME"
          git checkout "$BRANCH_NAME"
          git reset --hard "origin/$BRANCH_NAME"

      - name: Run dg-ai-dispatch planning
        id: plan
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          prompt: |
            You are running inside a Git repository in a GitHub Actions workflow.

            Read the user request from `.dg/ai-dispatch/prompt.md`.

            Your task:
            1. Analyze the requested change.
            2. Write a concise implementation plan to `${{ runner.temp }}/dg-ai-dispatch/plan.md`.
            3. Write `${{ runner.temp }}/dg-ai-dispatch/plan-result.json` with this exact JSON shape:
               {
                 "title": "<short descriptive title>"
               }

            Requirements:
            - Create the `${{ runner.temp }}/dg-ai-dispatch` directory and both files.
            - Keep the title under 80 characters.
            - The plan should be actionable and specific to this repository.
            - Do not modify application code.
            - Do not create git commits.
          claude_args: |
            --model ${{ inputs.model_name }}
            --permission-mode auto

      - name: Verify plan outputs exist
        run: |
          if [ ! -f "${{ runner.temp }}/dg-ai-dispatch/plan.md" ]; then
            echo "::error::Planning succeeded but plan.md was not created"
            exit 1
          fi
          if [ ! -f "${{ runner.temp }}/dg-ai-dispatch/plan-result.json" ]; then
            echo "::error::Planning succeeded but plan-result.json was not created"
            exit 1
          fi

      - name: Update PR body with plan
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PLAN_PATH: ${{ runner.temp }}/dg-ai-dispatch/plan.md
          PROMPT_PATH: .dg/ai-dispatch/prompt.md
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          prompt = Path(os.environ["PROMPT_PATH"]).read_text(encoding="utf-8")
          plan = Path(os.environ["PLAN_PATH"]).read_text(encoding="utf-8")
          body = (
              "_Dispatch plan generated by the AI dispatch workflow._\n\n"
              "## Prompt\n\n"
              f"{prompt}\n\n"
              "## Plan\n\n"
              f"{plan}\n"
          )
          Path("/tmp/dg-ai-dispatch-pr-body.md").write_text(body, encoding="utf-8")
          PY
          gh pr edit "$PR_NUMBER" --body-file /tmp/dg-ai-dispatch-pr-body.md

  implement:
    needs: plan
    if: needs.plan.result == 'success' && !inputs.plan_only && vars.CLAUDE_ENABLED != 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Validate Claude credentials
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error title=Missing Secret::ANTHROPIC_API_KEY must be configured"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "${{ inputs.submitted_by }}"
          git config user.email "${{ inputs.submitted_by }}@users.noreply.github.com"

      - name: Checkout implementation branch
        env:
          BRANCH_NAME: ${{ inputs.branch_name }}
        run: |
          git fetch origin "$BRANCH_NAME"
          git checkout "$BRANCH_NAME"
          git reset --hard "origin/$BRANCH_NAME"

      - name: Save pre-implementation HEAD
        id: pre_impl
        run: echo "head=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Read plan from PR body
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: gh pr view "$PR_NUMBER" --json body --jq .body > "${{ runner.temp }}/dg-ai-dispatch-pr-body.md"

      - name: Run dg-ai-dispatch implementation
        id: implement
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          prompt: |
            You are running inside a Git repository in a GitHub Actions workflow.

            Read:
            - `.dg/ai-dispatch/prompt.md`
            - `${{ runner.temp }}/dg-ai-dispatch-pr-body.md`

            Implement the requested change in the current branch using the plan embedded in the PR body.

            Requirements:
            - Make the necessary code changes directly in the repository.
            - Keep changes focused and minimal.
            - You may run lightweight validation commands if helpful.
            - Do not create git commits yourself.
            - Do not modify `.dg/ai-dispatch/prompt.md`.
          claude_args: |
            --model ${{ inputs.model_name }}
            --permission-mode auto

      - name: Handle implementation outcome
        id: handle_outcome
        run: |
          UNCOMMITTED=$(git status --porcelain | grep -v '^\?\? \.dg/ai-dispatch/' || true)
          CURRENT_HEAD=$(git rev-parse HEAD)
          NEW_COMMITS=false
          if [ "$CURRENT_HEAD" != "${{ steps.pre_impl.outputs.head }}" ]; then
            NEW_COMMITS=true
          fi
          if [ -z "$UNCOMMITTED" ] && [ "$NEW_COMMITS" = false ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push implementation
        if: steps.handle_outcome.outputs.has_changes == 'true'
        env:
          BRANCH_NAME: ${{ inputs.branch_name }}
        run: |
          git add -A
          if [[ -n $(git status --porcelain | grep -v '^\?\? \.dg/ai-dispatch/' || true) ]]; then
            git commit -m "Implement dg-ai-dispatch changes"
          fi
          git push origin "$BRANCH_NAME"

      - name: Mark PR ready for review
        if: steps.handle_outcome.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ inputs.branch_name }}
        run: gh pr ready "$BRANCH_NAME"

      - name: Comment on PR when no changes were made
        if: steps.handle_outcome.outputs.has_changes != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          gh pr comment "$PR_NUMBER" --body "dg-ai-dispatch completed successfully but did not produce code changes."
