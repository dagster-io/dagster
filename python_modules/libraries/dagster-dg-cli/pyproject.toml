[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-dg-cli"
version = "1.13.6"
requires-python = ">=3.10,<3.15"
description = ""
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
dependencies = [
    "dagster-cloud-cli==1.13.6",
    "dagster-dg-core==1.13.6",
    "dagster-rest-resources==0.29.6",
    "dagster==1.13.6",
    "githubkit",
    "typer",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-dg-cli"

[project.scripts]
dg = "dagster_dg_cli.cli:main"

[project.optional-dependencies]
ai = [
    "anthropic; python_version>='3.10'",
    "claude-code-sdk>=0.0.19; python_version>='3.10'",
]

[dependency-groups]
test = [
    "pytest",
    "pytest-xdist",
    "typer",
    "dagster-dg-core[test]",
    "dagster[test]",
    "dagster-test",
    "dagster-graphql",
    "dagster-pipes",
    "dagster-shared",
    "dagster-cloud-cli",
    "dagster-rest-resources",
    "create-dagster",
    "automation",
    "dagster-dbt",
    "dagster-fivetran",
    "dagster-sling",
    "syrupy>=4.0.0",
]
test-plus = [
    "dagster-aws",
    "dagster-k8s",
    "dagster-docker",
]

[tool.uv]
exclude-newer = "48h"

[tool.uv.sources.dagster-dg-core]
path = "../dagster-dg-core"
editable = true

[tool.uv.sources.dagster]
path = "../../../python_modules/dagster"
editable = true

[tool.uv.sources.dagster-test]
path = "../../../python_modules/dagster-test"
editable = true

[tool.uv.sources.dagster-graphql]
path = "../../../python_modules/dagster-graphql"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../../python_modules/dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../../../python_modules/libraries/dagster-shared"
editable = true

[tool.uv.sources.dagster-cloud-cli]
path = "../../../python_modules/libraries/dagster-cloud-cli"
editable = true

[tool.uv.sources.dagster-rest-resources]
path = "../../../python_modules/libraries/dagster-rest-resources"
editable = true

[tool.uv.sources.create-dagster]
path = "../../../python_modules/libraries/create-dagster"
editable = true

[tool.uv.sources.automation]
path = "../../../python_modules/automation"
editable = true

[tool.uv.sources.dagster-dbt]
path = "../dagster-dbt"
editable = true

[tool.uv.sources.dagster-fivetran]
path = "../dagster-fivetran"
editable = true

[tool.uv.sources.dagster-sling]
path = "../dagster-sling"
editable = true

[tool.uv.sources.dagster-aws]
path = "../../../python_modules/libraries/dagster-aws"
editable = true

[tool.uv.sources.dagster-k8s]
path = "../../../python_modules/libraries/dagster-k8s"
editable = true

[tool.uv.sources.dagster-docker]
path = "../../../python_modules/libraries/dagster-docker"
editable = true

[tool.hatch.build]
exclude = [
    "dagster_dg_cli/cli/plus/*.md",
    "dagster_dg_cli/cli/plus/schema.graphql",
]
