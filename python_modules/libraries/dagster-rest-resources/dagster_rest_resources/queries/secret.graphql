fragment SecretFields on Secret {
  id
  secretName
  updatedBy {
    email
  }
  updateTimestamp
  locationNames
  fullDeploymentScope
  allBranchDeploymentsScope
  specificBranchDeploymentScope
  localDeploymentScope
  canViewSecretValue
  canEditSecret
}

query ListSecrets(
  $locationName: String
  $scopes: SecretScopesInput
  $secretName: String
) {
  secretsOrError(
    locationName: $locationName
    scopes: $scopes
    secretName: $secretName
  ) {
    __typename
    ... on Secrets {
      secrets {
        ...SecretFields
      }
    }
    ... on UnauthorizedError {
      message
    }
    ... on PythonError {
      message
    }
  }
}

query GetSecretWithValue(
  $locationName: String
  $scopes: SecretScopesInput
  $secretName: String
) {
  secretsOrError(
    locationName: $locationName
    scopes: $scopes
    secretName: $secretName
  ) {
    __typename
    ... on Secrets {
      secrets {
        ...SecretFields
        secretValue
      }
    }
    ... on UnauthorizedError {
      message
    }
    ... on PythonError {
      message
    }
  }
}
