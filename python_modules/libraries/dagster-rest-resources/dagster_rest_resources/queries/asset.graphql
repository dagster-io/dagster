query GetAssetConditionEvaluations($assetKey: AssetKeyInput!, $limit: Int!, $cursor: String) {
  assetConditionEvaluationRecordsOrError(assetKey: $assetKey, limit: $limit, cursor: $cursor) {
    __typename
    ... on AssetConditionEvaluationRecords {
      records {
        evaluationId
        timestamp
        numRequested
        runIds
        startTimestamp
        endTimestamp
        rootUniqueId
        evaluationNodes {
          uniqueId
          userLabel
          expandedLabel
          startTimestamp
          endTimestamp
          numTrue
          numCandidates
          isPartitioned
          childUniqueIds
          operatorType
        }
      }
    }
    ... on AutoMaterializeAssetEvaluationNeedsMigrationError {
      message
    }
  }
}

query GetAssetPartitionStatus($assetKey: AssetKeyInput!) {
  assetNodeOrError(assetKey: $assetKey) {
    __typename
    ... on AssetNode {
      partitionStats {
        numMaterialized
        numPartitions
        numFailed
        numMaterializing
      }
    }
    ... on AssetNotFoundError {
      message
    }
  }
}
