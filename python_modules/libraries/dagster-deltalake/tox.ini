[tox]
requires =
    tox-uv>=1
envlist = py{39,38,37}-{unix,windows}
skipsdist = true

[testenv]
download = True
passenv =
    CI_*
    AZURE_*
    BUILDKITE*
    SSH_*
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
deps =
  -e ../../dagster[test]
  -e ../../dagster-pipes
  -e ../dagster-shared
  -e .[pandas]
allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster -e dagit'
  pytest -vv {posargs}
