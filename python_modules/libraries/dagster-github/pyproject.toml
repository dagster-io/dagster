[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-github"
version = "0.29.6"
description = "A Github client resource for interacting with the github API with a github App"
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1.13.6",
    "pyjwt[crypto]",
    "requests",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-github"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true
