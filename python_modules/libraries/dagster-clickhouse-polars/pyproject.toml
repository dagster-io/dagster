[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-clickhouse-polars"
version = "1!0+dev"
description = "Package for storing Polars DataFrames in ClickHouse."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1!0+dev",
    "dagster-clickhouse==1!0+dev",
    "pandas<3.0.0",
    "polars[pyarrow]",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-clickhouse-polars"

[project.optional-dependencies]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-clickhouse",
    "testcontainers[clickhouse]>=4.0",
]

[tool.uv.sources]
dagster = { path = "../../dagster", editable = true }
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster-shared = { path = "../dagster-shared", editable = true }
dagster-clickhouse = { path = "../dagster-clickhouse", editable = true }
