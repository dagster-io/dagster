[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-clickhouse-polars"
version = "0.29.4"
description = "Package for storing Polars DataFrames in ClickHouse."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster==1.13.4",
    "dagster-clickhouse==0.29.4",
    "pandas<3.0.0",
    "polars[pyarrow]",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-clickhouse-polars"

[project.optional-dependencies]
test = [
    "testcontainers[clickhouse]>=4.0",
]
