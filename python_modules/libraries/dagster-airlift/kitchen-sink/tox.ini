[tox]
requires =
    tox-uv>=1
skipsdist = true

[testenv]
download = True
passenv =
    CI_*
    BUILDKITE*
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
deps =
  -e ../../../../python_modules/dagster[test]
  -e ../../../../python_modules/dagster-webserver
  -e ../../../../python_modules/dagster-test
  -e ../../../../python_modules/dagster-pipes
  -e ../../../../python_modules/libraries/dagster-shared
  -e ../../../../python_modules/dagster-graphql
  -e ../../../../python_modules/libraries/dagster-dbt
  -e ../../../../python_modules/libraries/dagster-pandas
  -e ../../dagster-airlift[core,test,in-airflow]
  -e .
allowlist_externals =
  /bin/bash
  uv
  just
commands =
  # We need to rebuild the UI to ensure that the dagster-webserver can run
  just -f ../../../../justfile rebuild_ui
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  pytest ./kitchen_sink_tests --snapshot-warn-unused -vv {posargs}
