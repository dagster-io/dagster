[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-airlift"
version = "0.29.6"
requires-python = ">=3.10,<3.12"
description = "A toolkit for observing integration and migration between Apache Airflow and Dagster."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-airlift"

[project.scripts]
dagster-airlift = "dagster_airlift.cli:cli"

[project.entry-points."dagster_dg_cli.registry_modules"]
"dagster_airlift.core.components" = "dagster_airlift.core.components"

[project.optional-dependencies]
core = [
    "dagster==1.13.6",
    "click",
    "structlog",
]
in-airflow = [
    "click",
    "structlog",
]
tutorial = [
    "dagster-webserver==1.13.6",
    "apache-airflow==2.9.3; python_version < '3.12'",
    "marshmallow==3.20.1; python_version < '3.12'",
    "pendulum>=2.0.0,<4.0.0; python_version < '3.12'",
    "apache-airflow>=2.9.0; python_version >= '3.12'",
    "marshmallow==3.23.1; python_version >= '3.12'",
    "pendulum>=3.0.0; python_version >= '3.12'",
    "flask-session<0.6.0",
    "connexion<3.0.0",
    "fastapi<0.118",
    "click",
    "structlog",
]
mwaa = [
    "boto3>=1.18.0",
]
test = [
    "pytest",
    "dagster-dbt==0.29.6",
    "dbt-duckdb",
    "boto3",
    "dagster-webserver==1.13.6",
    "apache-airflow==2.9.3; python_version < '3.12'",
    "marshmallow==3.20.1; python_version < '3.12'",
    "pendulum>=2.0.0,<4.0.0; python_version < '3.12'",
    "apache-airflow>=2.9.0; python_version >= '3.12'",
    "marshmallow==3.23.1; python_version >= '3.12'",
    "pendulum>=3.0.0; python_version >= '3.12'",
    "flask-session<0.6.0",
    "connexion<3.0.0",
    "click",
    "structlog",
]

[dependency-groups]
test = [
    "dagster[test,test-components]",
    "dagster-test",
    "dagster-pipes",
    "dagster-shared",
    "dagster-webserver",
    "dagster-graphql",
    "dagster-dbt",
    "dagster-k8s",
    "dagster-dg-cli",
    "dagster-dg-core",
    "dagster-cloud-cli",
    "dagster-rest-resources",
    "dbt-duckdb",
]

[tool.uv.sources.dagster]
path = "../../../python_modules/dagster"
editable = true

[tool.uv.sources.dagster-test]
path = "../../../python_modules/dagster-test"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../../python_modules/dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../../../python_modules/libraries/dagster-shared"
editable = true

[tool.uv.sources.dagster-webserver]
path = "../../../python_modules/dagster-webserver"
editable = true

[tool.uv.sources.dagster-graphql]
path = "../../../python_modules/dagster-graphql"
editable = true

[tool.uv.sources.dagster-dbt]
path = "../dagster-dbt"
editable = true

[tool.uv.sources.dagster-k8s]
path = "../dagster-k8s"
editable = true

[tool.uv.sources.dagster-dg-cli]
path = "../dagster-dg-cli"
editable = true

[tool.uv.sources.dagster-dg-core]
path = "../dagster-dg-core"
editable = true

[tool.uv.sources.dagster-cloud-cli]
path = "../dagster-cloud-cli"
editable = true

[tool.uv.sources.dagster-rest-resources]
path = "../dagster-rest-resources"
editable = true
