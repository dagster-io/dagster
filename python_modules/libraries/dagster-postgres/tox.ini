[tox]
requires =
    tox-uv>=1
skipsdist = true

[testenv]
download = True
passenv =
    CI_*
    POSTGRES_TEST_*
    BUILDKITE*
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
deps =
  storage_tests_sqlalchemy_1_3: sqlalchemy<1.4
  -e ../../dagster[test]
  -e ../../dagster-test
  -e ../../dagster-pipes
  -e ../dagster-shared
  -e .[test]
allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  storage_tests: pytest -vv {posargs}
  storage_tests_sqlalchemy_1_3: pytest -vv {posargs}
