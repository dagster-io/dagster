[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-postgres"
version = "0.29.5rc0"
description = "A Dagster integration for postgres"
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster==1.13.5rc0",
    "psycopg2-binary",
]

[project.optional-dependencies]
azure = [
    "azure-identity>=1.12.0",
]
gcp = [
    "google-auth>=2.0.0",
]
aws = [
    "boto3>=1.26.0",
]
wif = [
    "azure-identity>=1.12.0",
    "google-auth>=2.0.0",
    "boto3>=1.26.0",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-postgres"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-test",
    "dagster-pipes",
    "dagster-shared",
]
test-sqlalchemy-1-3 = [
    "sqlalchemy<1.4",
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-test]
path = "../../dagster-test"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true
