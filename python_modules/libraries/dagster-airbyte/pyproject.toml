[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-airbyte"
version = "0.29.6"
description = "Package for integrating Airbyte with Dagster."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1.13.6",
    "python-dateutil",
    "requests",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-airbyte"

[project.scripts]
dagster-airbyte = "dagster_airbyte.cli:main"

[project.entry-points."dagster_dg_cli.plugin"]
dagster_airbyte = "dagster_airbyte"

[project.optional-dependencies]
managed = [
    "dagster-managed-elements==0.29.6",
]

[dependency-groups]
test = [
    "dagster-graphql",
    "dagster-pipes",
    "dagster[test]",
    "dagster-test",
    "dagster-shared",
    "create-dagster",
    "dagster-dg-cli",
    "dagster-dg-core[test]",
    "dagster-cloud-cli",
    "dagster-rest-resources",
    "dagster-managed-elements",
    "requests-mock",
    "pytest-rerunfailures",
]

[tool.uv.sources.dagster-graphql]
path = "../../dagster-graphql"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-test]
path = "../../dagster-test"
editable = true

[tool.uv.sources.dagster-shared]
path = "../../libraries/dagster-shared"
editable = true

[tool.uv.sources.create-dagster]
path = "../create-dagster"
editable = true

[tool.uv.sources.dagster-dg-cli]
path = "../dagster-dg-cli"
editable = true

[tool.uv.sources.dagster-dg-core]
path = "../dagster-dg-core"
editable = true

[tool.uv.sources.dagster-cloud-cli]
path = "../dagster-cloud-cli"
editable = true

[tool.uv.sources.dagster-rest-resources]
path = "../dagster-rest-resources"
editable = true

[tool.uv.sources.dagster-managed-elements]
path = "../dagster-managed-elements"
editable = true
