[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-docker"
version = "1!0+dev"
description = "A Dagster integration for docker"
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1!0+dev",
    "docker",
    "docker-image-py",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-docker"

[project.optional-dependencies]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-graphql",
    "dagster-test",
    "dagster-aws",
    "dagster-pandas",
    "dagster-gcp",
    "dagster-celery",
    "dagster-celery-docker",
    "dagster-k8s",
    "dagster-celery-k8s",
    "dagster-postgres",
    "pytest-rerunfailures",
    "botocore>=1.21.49",
]

[tool.uv.sources]
dagster = { path = "../../dagster", editable = true }
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster-shared = { path = "../dagster-shared", editable = true }
dagster-graphql = { path = "../../dagster-graphql", editable = true }
dagster-test = { path = "../../dagster-test", editable = true }
dagster-aws = { path = "../dagster-aws", editable = true }
dagster-pandas = { path = "../dagster-pandas", editable = true }
dagster-gcp = { path = "../dagster-gcp", editable = true }
dagster-celery = { path = "../dagster-celery", editable = true }
dagster-celery-docker = { path = "../dagster-celery-docker", editable = true }
dagster-k8s = { path = "../dagster-k8s", editable = true }
dagster-celery-k8s = { path = "../dagster-celery-k8s", editable = true }
dagster-postgres = { path = "../dagster-postgres", editable = true }
