[tox]
requires =
    tox-uv>=1.16
skipsdist = true

[testenv]
runner = uv-venv-lock-runner
uv_sync_locked = false
uv_sync_flags = --frozen
download = True
passenv =
    HOME
    CI_*
    BUILDKITE*
    AWS_SECRET_ACCESS_KEY
    AWS_ACCESS_KEY_ID
    DAGSTER_DOCKER_*
    DOCKER_*
    GOOGLE_*
    POSTGRES_TEST_DB_HOST
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
dependency_groups =
    test
allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  pytest -vv {posargs}
