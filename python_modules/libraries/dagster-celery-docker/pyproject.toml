[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-celery-docker"
version = "0.29.8"
description = "A Dagster integration for celery-docker"
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1.13.8",
    "dagster-celery==0.29.8",
    "dagster-graphql==1.13.8",
    "docker",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-celery-docker"

[project.optional-dependencies]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-graphql",
    "dagster-test",
    "dagster-aws",
    "dagster-pandas",
    "dagster-gcp",
    "dagster-celery",
    "dagster-postgres",
    "botocore>=1.21.49",
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true

[tool.uv.sources.dagster-graphql]
path = "../../dagster-graphql"
editable = true

[tool.uv.sources.dagster-test]
path = "../../dagster-test"
editable = true

[tool.uv.sources.dagster-aws]
path = "../dagster-aws"
editable = true

[tool.uv.sources.dagster-pandas]
path = "../dagster-pandas"
editable = true

[tool.uv.sources.dagster-gcp]
path = "../dagster-gcp"
editable = true

[tool.uv.sources.dagster-celery]
path = "../dagster-celery"
editable = true

[tool.uv.sources.dagster-postgres]
path = "../dagster-postgres"
editable = true
