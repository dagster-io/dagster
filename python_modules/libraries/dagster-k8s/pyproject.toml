[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-k8s"
version = "1!0+dev"
description = "A Dagster integration for k8s"
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1!0+dev",
    "kubernetes<37",
    # exclude a google-auth release that added an overly restrictive urllib3 pin
    # that confuses dependency resolvers
    "google-auth!=2.23.1",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-k8s"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-graphql",
    "dagster-test",
    "dagster-aws",
    "dagster-pandas",
    "dagster-gcp",
    "dagster-celery",
    "dagster-postgres",
    "dagster-celery-k8s",
    "dagster-celery-docker",
]
test-old-kubernetes = [
    "kubernetes==12.0.0",
]

[tool.uv.sources]
dagster = { path = "../../dagster", editable = true }
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster-shared = { path = "../../libraries/dagster-shared", editable = true }
dagster-graphql = { path = "../../dagster-graphql", editable = true }
dagster-test = { path = "../../dagster-test", editable = true }
dagster-aws = { path = "../../libraries/dagster-aws", editable = true }
dagster-pandas = { path = "../../libraries/dagster-pandas", editable = true }
dagster-gcp = { path = "../../libraries/dagster-gcp", editable = true }
dagster-celery = { path = "../../libraries/dagster-celery", editable = true }
dagster-postgres = { path = "../../libraries/dagster-postgres", editable = true }
dagster-celery-k8s = { path = "../../libraries/dagster-celery-k8s", editable = true }
dagster-celery-docker = { path = "../../libraries/dagster-celery-docker", editable = true }
