[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-gcp"
version = "0.28.19"
description = "Package for GCP-specific Dagster framework op and resource components."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster==1.12.19",
    "dagster-pandas==0.28.19",
    "db-dtypes",
    "google-api-python-client",
    "google-cloud-bigquery>=1.28.3",
    "google-cloud-storage",
    "oauth2client",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-gcp"

[project.optional-dependencies]
pyarrow = [
    "pyarrow",
]
test = [
    "gcp-storage-emulator",
]
dataproc = [
    "google-cloud-dataproc",
]

[project.entry-points."dagster_dg_cli.registry_modules"]
dagster_gcp = "dagster_gcp.components"
