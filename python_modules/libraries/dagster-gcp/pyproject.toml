[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-gcp"
version = "0.29.6"
description = "Package for GCP-specific Dagster framework op and resource components."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1.13.6",
    "dagster-pandas==0.29.6",
    "db-dtypes",
    "google-api-python-client",
    "google-cloud-bigquery>=1.28.3",
    "google-cloud-storage",
    "oauth2client",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-gcp"

[project.optional-dependencies]
pyarrow = [
    "pyarrow",
]
dataproc = [
    "google-cloud-dataproc",
]

[project.entry-points."dagster_dg_cli.registry_modules"]
dagster_gcp = "dagster_gcp.components"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-test",
    "dagster-pipes",
    "dagster-shared",
    "dagster-pandas",
    "gcp-storage-emulator",
    "setuptools<82",
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-test]
path = "../../dagster-test"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true

[tool.uv.sources.dagster-pandas]
path = "../dagster-pandas"
editable = true
