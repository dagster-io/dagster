[tox]
requires =
    tox-uv>=1
skipsdist = true

[testenv]
download = True
passenv =
    CI_*
    AWS_SECRET_ACCESS_KEY
    AWS_ACCESS_KEY_ID
    BUILDKITE*
    SNOWFLAKE_ACCOUNT
    SNOWFLAKE_USER
    SNOWFLAKE_DEMO_PRIVATE_KEY
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
deps =
  -e .[snowflake.sqlalchemy]
  -e ../../dagster[test]
  -e ../../dagster-pipes
  -e ../dagster-shared
  -e ../dagster-pandas
  -e .
allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
    pytest -vv {posargs}
