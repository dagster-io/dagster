[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-snowflake"
version = "0.29.7"
description = "Package for Snowflake Dagster framework components."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1.13.7",
    "snowflake-snowpark-python>=1.24.0",
    "snowflake-core>=1.8.0",
    "snowflake-connector-python>=3.4.0",
    "pyOpenSSL>=22.1.0",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-snowflake"

[project.entry-points."dagster_dg_cli.registry_modules"]
dagster_snowflake = "dagster_snowflake"

[project.optional-dependencies]
"snowflake.sqlalchemy" = [
    "sqlalchemy!=1.4.42",
    "snowflake-sqlalchemy",
]
pandas = [
    "pandas<3.0.0",
    "snowflake-connector-python[pandas]>=3.4.0",
]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-pandas",
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true

[tool.uv.sources.dagster-pandas]
path = "../dagster-pandas"
editable = true
