[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-snowflake-polars"
version = "1!0+dev"
description = "Package for integrating Snowflake and Polars with Dagster."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1!0+dev",
    "dagster-snowflake==1!0+dev",
    "polars>=1.0.0",
    "requests",
    "adbc-driver-snowflake>=1.6.0",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-snowflake-polars"

[project.optional-dependencies]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-snowflake",
    "dagster-shared",
    "certifi==2025.1.31",
    "snowflake-connector-python[pandas]>=3.4.0",
]

[tool.uv.sources]
dagster = { path = "../../dagster", editable = true }
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster-snowflake = { path = "../dagster-snowflake", editable = true }
dagster-shared = { path = "../dagster-shared", editable = true }
