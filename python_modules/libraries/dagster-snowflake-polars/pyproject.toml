[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-snowflake-polars"
version = "0.28.19"
description = "Package for integrating Snowflake and Polars with Dagster."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster==1.12.19",
    "dagster-snowflake==0.28.19",
    "polars>=1.0.0",
    "requests",
    "adbc-driver-snowflake>=1.6.0",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-snowflake-polars"

[project.optional-dependencies]
test = [
    "certifi==2025.1.31",
    "snowflake-connector-python[pandas]>=3.4.0",
]
