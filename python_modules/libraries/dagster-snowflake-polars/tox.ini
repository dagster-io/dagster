[tox]
requires =
    tox-uv>=1
skipsdist = true

[testenv]
download = True
passenv =
    CI_*
    BUILDKITE*
    SNOWFLAKE_BUILDKITE_PRIVATE_KEY
    SNOWFLAKE_ACCOUNT
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
deps =
  -e ../../dagster[test]
  -e ../../dagster-pipes
  -e ../dagster-snowflake
  -e ../dagster-shared
  -e .[test]
allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster -e dagit'
  pytest -vv ./dagster_snowflake_polars_tests --durations 10 {posargs}
