[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-pandera"
version = "1!0+dev"
description = "Integration layer for dagster and pandera."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1!0+dev",
    "pandas<3.0.0",
    "pandera>=0.24.0",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster"

[project.optional-dependencies]
polars = [
    "polars>=1",
]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "polars>=1",
    "pytest",
]

[tool.uv.sources]
dagster = { path = "../../dagster", editable = true }
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster-shared = { path = "../dagster-shared", editable = true }
