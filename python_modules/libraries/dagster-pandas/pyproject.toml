[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-pandas"
version = "1!0+dev"
description = "Utilities and examples for working with pandas and dagster, an opinionated framework for expressing data pipelines"
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1!0+dev",
    "pandas<3.0.0",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagstermill",
    # Previously pulled via `dagstermill[test]`; folded when removing dagstermill's test extra
    "matplotlib",
    "scikit-learn>=0.19.0",
    "tqdm",
]

[tool.uv.sources]
dagster = { path = "../../dagster", editable = true }
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster-shared = { path = "../dagster-shared", editable = true }
dagstermill = { path = "../dagstermill", editable = true }
