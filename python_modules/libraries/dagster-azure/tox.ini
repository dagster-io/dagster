[tox]
requires =
    tox-uv>=1
skipsdist = true

[testenv]
download = True
passenv =
    CI_*
    AZURE_*
    BUILDKITE*
    SSH_*
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
deps =
  -e ../../dagster[test]
  -e ../../dagster-test
  -e ../../dagster-pipes
  -e ../dagster-shared
  -e ../dagster-spark
  -e ../dagster-pyspark
  -e .
allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  pytest -vv {posargs}
