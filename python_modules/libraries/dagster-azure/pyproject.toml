[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-azure"
version = "1!0+dev"
description = "Package for Azure-specific Dagster framework op and resource components."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "azure-core<2.0.0,>=1.7.0",
    "azure-identity<2.0.0,>=1.7.0",
    "azure-ai-ml<2.0.0,>=1.28.0",
    "azure-storage-blob<13.0.0,>=12.5.0",
    "azure-storage-file-datalake<13.0.0,>=12.5",
    "dagster==1!0+dev",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-azure"

[project.scripts]
dagster-azure = "dagster_azure.cli.cli:main"

[project.entry-points."dagster_dg_cli.registry_modules"]
dagster_azure = "dagster_azure.components"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-test",
    "dagster-pipes",
    "dagster-shared",
    "dagster-spark",
    "dagster-pyspark",
]

[tool.uv.sources]
dagster = { path = "../../dagster", editable = true }
dagster-test = { path = "../../dagster-test", editable = true }
dagster-pipes = { path = "../../dagster-pipes", editable = true }
dagster-shared = { path = "../dagster-shared", editable = true }
dagster-spark = { path = "../dagster-spark", editable = true }
dagster-pyspark = { path = "../dagster-pyspark", editable = true }
