[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "create-dagster"
version = "1.13.5"
description = "CLI for creating a new dg project or workspace."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster-dg-core==1.13.5",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/create-dagster"

[project.scripts]
create-dagster = "create_dagster.cli:main"

[project.optional-dependencies]

[dependency-groups]
test = [
    "dagster-pipes",
    "dagster",
    "dagster-dg-core",
    "dagster-shared",
    "dagster-cloud-cli",
    "dagster-test",
    "pytest",
    "pytest-rerunfailures",
    "psutil",
]

[tool.uv.sources.dagster-pipes]
path = "../../../python_modules/dagster-pipes"
editable = true

[tool.uv.sources.dagster]
path = "../../../python_modules/dagster"
editable = true

[tool.uv.sources.dagster-dg-core]
path = "../dagster-dg-core"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true

[tool.uv.sources.dagster-cloud-cli]
path = "../dagster-cloud-cli"
editable = true

[tool.uv.sources.dagster-test]
path = "../../../python_modules/dagster-test"
editable = true
