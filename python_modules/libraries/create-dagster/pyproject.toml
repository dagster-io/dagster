[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "create-dagster"
version = "1!0+dev"
requires-python = ">=3.10,<3.15"
description = "CLI for creating a new dg project or workspace."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
dependencies = [
    "dagster-dg-core==1!0+dev",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/create-dagster"

[project.scripts]
create-dagster = "create_dagster.cli:main"

[project.optional-dependencies]

[dependency-groups]
test = [
    "dagster-pipes",
    "dagster",
    "dagster-dg-core",
    "dagster-shared",
    "dagster-cloud-cli",
    "dagster-test",
    "pytest",
    "pytest-rerunfailures",
    "psutil",
]

[tool.uv.sources]
dagster-pipes = { path = "../../../python_modules/dagster-pipes", editable = true }
dagster = { path = "../../../python_modules/dagster", editable = true }
dagster-dg-core = { path = "../dagster-dg-core", editable = true }
dagster-shared = { path = "../dagster-shared", editable = true }
dagster-cloud-cli = { path = "../dagster-cloud-cli", editable = true }
dagster-test = { path = "../../../python_modules/dagster-test", editable = true }
