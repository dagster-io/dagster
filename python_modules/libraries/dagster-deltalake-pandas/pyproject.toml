[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-deltalake-pandas"
version = "0.29.5rc0"
description = "Package for storing Pandas DataFrames in Delta tables."
authors = [
    { name = "Elementl", email = "hello@elementl.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster==1.13.5rc0",
    "dagster-deltalake==0.29.5rc0",
    "pandas<3.0.0",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-deltalake-pandas"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-deltalake",
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true

[tool.uv.sources.dagster-deltalake]
path = "../dagster-deltalake"
editable = true
