[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-snowflake-pyspark"
version = "0.29.8"
description = "Package for integrating Snowflake and PySpark with Dagster."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.14"
dependencies = [
    "dagster==1.13.8",
    "dagster-snowflake==0.29.8",
    "pyspark<4",
    "requests",
    "sqlalchemy!=1.4.42",
    "snowflake-sqlalchemy>=1.2",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-snowflake-pyspark"

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-snowflake[pandas]",
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true

[tool.uv.sources.dagster-snowflake]
path = "../dagster-snowflake"
editable = true
