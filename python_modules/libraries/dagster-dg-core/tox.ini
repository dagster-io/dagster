[tox]
requires =
    tox-uv>=1.16
skipsdist = true

[testenv]
runner = uv-venv-lock-runner
uv_sync_locked = false
uv_sync_flags = --frozen
download = True
passenv =
    CI_*
    PYTHON*
    BUILDKITE*
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
extras =
    test
dependency_groups =
    test
    plus: test-plus
allowlist_externals =
  /bin/bash
  uv
  jsonschema
  npm
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  pytest ./dagster_dg_core_tests -x -vv --durations 10 {posargs} --ignore=./dagster_dg_core_tests/cli_tests/test_docs_commands.py --ignore=./dagster_dg_core_tests/cli_tests/plus_tests
