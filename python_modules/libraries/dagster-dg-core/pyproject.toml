[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-dg-core"
version = "1.13.6"
requires-python = ">=3.10,<3.15"
description = ""
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
dependencies = [
    "Jinja2",
    "tomlkit<0.13.3",
    "click>=8,<9",
    "click-aliases",
    "typing_extensions>=4.4.0,<5",
    "gql[requests]",
    "markdown",
    "jsonschema",
    "PyYAML>=5.1",
    "rich",
    "watchdog",
    "yaspin",
    "setuptools",
    "packaging",
    "python-dotenv",
    "typer>=0.15.1,<1.0",
    "dagster-shared==1.13.6",
    "dagster-cloud-cli==1.13.6",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-dg-core"

[project.optional-dependencies]
test = [
    "click",
    "dagster==1.13.6",
    "freezegun",
    "psutil",
    "pydantic",
    "pytest",
    "dagster-graphql==1.13.6",
    "create-dagster==1.13.6",
]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-test",
    "dagster-graphql",
    "dagster-pipes",
    "dagster-shared",
    "create-dagster",
    "dagster-dg-cli",
    "dagster-cloud-cli",
    "dagster-rest-resources",
]
test-plus = [
    "dagster-aws",
    "dagster-k8s",
    "dagster-docker",
]

[tool.uv.sources.dagster]
path = "../../../python_modules/dagster"
editable = true

[tool.uv.sources.dagster-test]
path = "../../../python_modules/dagster-test"
editable = true

[tool.uv.sources.dagster-graphql]
path = "../../../python_modules/dagster-graphql"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../../python_modules/dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../../../python_modules/libraries/dagster-shared"
editable = true

[tool.uv.sources.create-dagster]
path = "../../../python_modules/libraries/create-dagster"
editable = true

[tool.uv.sources.dagster-dg-cli]
path = "../../../python_modules/libraries/dagster-dg-cli"
editable = true

