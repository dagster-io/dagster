[tox]
requires =
    tox-uv>=1
skipsdist = true

[testenv]
download = True
passenv =
    CI_*
    BUILDKITE*
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
deps =
  -e ../../dagster[test,test-components]
  -e ../../dagster-pipes
  -e ../dagster-shared
  -e .[test]
  -e ../dagster-dg-cli
  -e ../dagster-dg-core
  -e ../dagster-cloud-cli
  -e ../dagster-rest-resources
allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster'
  pytest -vv {posargs}
