[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-sling"
version = "0.29.8"
description = "Package for performing ETL/ELT tasks with Sling in Dagster."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster==1.13.8",
    "sling>=1.1.5",
    "sling-mac-arm64; platform_system=='Darwin' and platform_machine=='arm64'",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-sling"

[project.entry-points."dagster_dg_cli.registry_modules"]
dagster_sling = "dagster_sling"

[project.optional-dependencies]

[dependency-groups]
test = [
    "dagster[test,test-components]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-dg-cli",
    "dagster-dg-core",
    "dagster-cloud-cli",
    "dagster-rest-resources",
    "duckdb",
]

[tool.uv.sources.dagster]
path = "../../dagster"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../dagster-shared"
editable = true

[tool.uv.sources.dagster-dg-cli]
path = "../dagster-dg-cli"
editable = true

[tool.uv.sources.dagster-dg-core]
path = "../dagster-dg-core"
editable = true

[tool.uv.sources.dagster-cloud-cli]
path = "../dagster-cloud-cli"
editable = true

[tool.uv.sources.dagster-rest-resources]
path = "../dagster-rest-resources"
editable = true
