[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster"
version = "1.13.7"
description = "Dagster is an orchestration platform for the development, production, and observation of data assets."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Environment :: Web Environment",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "Topic :: System :: Monitoring",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
]
dependencies = [
    "click>=5.0,<9.0",
    "coloredlogs>=6.1,<=14.0",
    "Jinja2",
    "alembic>=1.2.1,!=1.6.3,!=1.7.0,!=1.11.0",
    "grpcio>=1.66.2; python_version>='3.13'",
    "grpcio>=1.44.0; python_version<'3.13'",
    "grpcio-health-checking>=1.66.2; python_version>='3.13'",
    "grpcio-health-checking>=1.44.0; python_version<'3.13'",
    "protobuf>=3.20.0,<7; python_version<'3.11'",
    "protobuf>=4,<7; python_version>='3.11'",
    "python-dotenv",
    "pytz",
    "requests",
    "six",
    "tabulate",
    "tomli<3",
    "tqdm<5",
    "tzdata",
    "structlog",
    "sqlalchemy>=1.0,<3",
    "toposort>=1.0",
    "watchdog>=0.8.3,<7",
    "psutil>=1.0; platform_system==\"Windows\"",
    "pywin32!=226; platform_system==\"Windows\"",
    "docstring-parser",
    "universal_pathlib; python_version<'3.12'",
    "universal_pathlib>=0.2.0; python_version>='3.12'",
    "rich",
    "filelock",
    "dagster-pipes==1.13.7",
    "dagster-shared==1.13.7",
    "antlr4-python3-runtime<4.14",
]

[project.urls]
Homepage = "https://dagster.io"
GitHub = "https://github.com/dagster-io/dagster"
Documentation = "https://docs.dagster.io"
Changelog = "https://github.com/dagster-io/dagster/releases"
"Issue Tracker" = "https://github.com/dagster-io/dagster/issues"
Twitter = "https://twitter.com/dagster"
YouTube = "https://www.youtube.com/@dagsterio"
Slack = "https://dagster.io/slack"
Blog = "https://dagster.io/blog"
Newsletter = "https://dagster.io/newsletter-signup"

[project.scripts]
dagster = "dagster._cli:main"
dagster-daemon = "dagster._daemon.cli:main"

[project.entry-points."dagster_dg_cli.registry_modules"]
dagster = "dagster"

[project.optional-dependencies]
docker = [
    "docker",
]
test = [
    "docker",
    "grpcio-tools>=1.66.2; python_version>='3.13'",
    "grpcio-tools>=1.44.0; python_version<'3.13'",
    "mypy-protobuf",
    "objgraph",
    "pytest-cov==5.0.0",
    "pytest-mock==3.14.0",
    "pytest-xdist==3.6.1",
    "pytest>=8",
    "pytest-asyncio",
    "pytest-timeout",
    "responses<=0.23.1",
    "syrupy>=4.0.0",
    "tox>=4.22",
    "tox-uv>=1.16",
    "morefs[asynclocal]",
    "rapidfuzz",
    "pytest-rerunfailures",
    "psutil",
    "ruff==0.15.13",
]
test-components = [
    "tomlkit",
    "jsonschema",
    "pandas<3.0.0",
    "duckdb",
]
mypy = [
    "mypy==1.8.0",
]
pyright = [
    "pyright==1.1.389",
    "pandas-stubs",
    "types-backports",
    "types-certifi",
    "types-chardet",
    "types-cryptography",
    "types-mock",
    "types-paramiko",
    "types-pyOpenSSL",
    "types-python-dateutil~=2.9.0.20240316",
    "types-PyYAML",
    "types-pytz",
    "types-requests",
    "types-simplejson",
    "types-six",
    "types-tabulate",
    "types-tzlocal",
    "types-toml",
]
ruff = [
    "ruff==0.15.13",
]
ty = [
    "ty==0.0.39",
    "pandas-stubs",
    "types-backports",
    "types-certifi",
    "types-chardet",
    "types-cryptography",
    "types-mock",
    "types-paramiko",
    "types-pyOpenSSL",
    "types-python-dateutil~=2.9.0.20240316",
    "types-PyYAML",
    "types-pytz",
    "types-requests",
    "types-simplejson",
    "types-six",
    "types-tabulate",
    "types-tzlocal",
    "types-toml",
    "types-protobuf",
    "types-redis",
    "boto3-stubs[essential]",
    "types-freezegun",
]

[dependency-groups]
test = [
    "dagster-test",
    "dagster-pipes",
    "dagster-shared",
    "dagster-cloud-cli",
    "dagster-dg-core",
    "create-dagster",
    "dagster-graphql",
    "dagster-webserver",
]
test-sqlalchemy-1-3 = [
    "sqlalchemy<1.4",
]
test-sqlalchemy-1-4 = [
    "sqlalchemy<2",
]
test-old-protobuf = [
    "protobuf<4; python_version<'3.11'",
    "setuptools<82; python_version<'3.11'",
]
test-components = [
    "dagster-dg-cli",
    "dagster-rest-resources",
]

[tool.uv]
conflicts = [
    [
        { group = "test-sqlalchemy-1-3" },
        { group = "test-sqlalchemy-1-4" },
    ],
]

[tool.uv.sources.dagster-test]
path = "../dagster-test"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../libraries/dagster-shared"
editable = true

[tool.uv.sources.dagster-cloud-cli]
path = "../libraries/dagster-cloud-cli"
editable = true

[tool.uv.sources.dagster-dg-core]
path = "../libraries/dagster-dg-core"
editable = true

[tool.uv.sources.dagster-dg-cli]
path = "../libraries/dagster-dg-cli"
editable = true

[tool.uv.sources.create-dagster]
path = "../libraries/create-dagster"
editable = true

[tool.uv.sources.dagster-graphql]
path = "../dagster-graphql"
editable = true

[tool.uv.sources.dagster-webserver]
path = "../dagster-webserver"
editable = true

[tool.uv.sources.dagster-rest-resources]
path = "../libraries/dagster-rest-resources"
editable = true

[tool.hatch.build]
exclude = [
    "dagster/**/*.g4",
    "dagster/**/*.interp",
    "dagster/**/*.tokens",
    "dagster/**/Makefile",
    "dagster/**/ruff.toml",
]

[tool.hatch.build.force-include]
"dagster/_core/definitions/tags" = "dagster/_core/definitions/tags"
