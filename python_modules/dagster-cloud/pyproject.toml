[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagster-cloud"
requires-python = ">=3.10,<3.15"
version = "1!0+dev"
authors = [{name = "Elementl", email = "support@elementl.com"}]
license = {text = "Apache-2.0"}
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Environment :: Web Environment",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "License :: OSI Approved :: Apache Software License",
    "Topic :: System :: Monitoring",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster==1!0+dev",
    "dagster-shared==1!0+dev",
    "dagster-cloud-cli==1!0+dev",
    "pex>=2.1.132,<2.60.0", # https://github.com/pex-tool/pex/issues/2942
    "questionary",
    "requests",
    "typer>=0.15.0",
]

[project.readme]
file = "README.md"
content-type = "text/markdown"

[project.urls]
Homepage = "https://dagster.io/cloud"
GitHub = "https://github.com/dagster-io/dagster-cloud"
Changelog = "https://github.com/dagster-io/dagster-cloud/blob/main/CHANGES.md"
"Issue Tracker" = "https://github.com/dagster-io/dagster-cloud/issues"
Twitter = "https://twitter.com/dagster"
LinkedIn = "https://www.linkedin.com/showcase/dagster"
YouTube = "https://www.youtube.com/channel/UCfLnv9X8jyHTe6gJ4hVBo9Q"
Slack = "https://dagster.io/slack"
Blog = "https://dagster.io/blog"
Newsletter = "https://dagster.io/newsletter-signup"

[project.optional-dependencies]
insights = ["pyarrow"]
docker = ["docker", "dagster-docker==1!0+dev"]
kubernetes = ["kubernetes", "dagster-k8s==1!0+dev"]
ecs = ["dagster-aws==1!0+dev", "boto3"]
sandbox = ["supervisor"]
pex = ["boto3"]
serverless = ["boto3"]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared==1!0+dev",
    "dagster-test",
    "dagster-aws==1!0+dev",
    "dagster-cloud-cli==1!0+dev",
    "dagster-dbt",
    "dagster-dg-cli",
    "dagster-docker==1!0+dev",
    "dagster-k8s==1!0+dev",
    "dagster-rest-resources",
    "dbt-bigquery>=1.9.0",
    "dbt-core",
    "dbt-duckdb",
    "dbt-snowflake",
    "docker",
    "freezegun",
    "isort",
    "kubernetes",
    "moto[all]",
    "mypy",
    # Pex-tests exercise the production code path in dagster-cloud-cli's
    # `pex_builder/source.py` that shells out to `python -m pip install --target ...`
    # to build pyproject projects, so the test interpreter must have pip
    # importable. Declared explicitly because uv-created venvs (tox-uv) don't
    # seed pip by default. Mirrors the same dependency in dagster-cloud-cli's
    # test extra.
    "pip",
    "psutil",
    "pylint",
    "pytest",
    "responses",
    "syrupy",
    "types-PyYAML",
    "types-requests",
    "wordcloud",
]

[tool.uv.sources]
dagster = { path = "../dagster", editable = true }
dagster-pipes = { path = "../dagster-pipes", editable = true }
dagster-shared = { path = "../libraries/dagster-shared", editable = true }
dagster-test = { path = "../dagster-test", editable = true }
dagster-aws = { path = "../libraries/dagster-aws", editable = true }
dagster-cloud-cli = { path = "../libraries/dagster-cloud-cli", editable = true }
dagster-dbt = { path = "../libraries/dagster-dbt", editable = true }
dagster-dg-cli = { path = "../libraries/dagster-dg-cli", editable = true }
dagster-docker = { path = "../libraries/dagster-docker", editable = true }
dagster-k8s = { path = "../libraries/dagster-k8s", editable = true }
dagster-rest-resources = { path = "../libraries/dagster-rest-resources", editable = true }
