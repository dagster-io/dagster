[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagster-cloud"
requires-python = ">=3.10,<3.15"
version = "1.13.7"
authors = [
    { name = "Elementl", email = "support@elementl.com" },
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Environment :: Web Environment",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "License :: OSI Approved :: Apache Software License",
    "Topic :: System :: Monitoring",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster==1.13.7",
    "dagster-shared==1.13.7",
    "dagster-cloud-cli==1.13.7",
    "pex>=2.1.132,<2.60.0",
    "questionary",
    "requests",
    "typer>=0.15.0",
]

[project.license]
text = "Apache-2.0"

[project.readme]
file = "README.md"
content-type = "text/markdown"

[project.urls]
Homepage = "https://dagster.io/cloud"
GitHub = "https://github.com/dagster-io/dagster-cloud"
Changelog = "https://github.com/dagster-io/dagster-cloud/blob/main/CHANGES.md"
"Issue Tracker" = "https://github.com/dagster-io/dagster-cloud/issues"
Twitter = "https://twitter.com/dagster"
LinkedIn = "https://www.linkedin.com/showcase/dagster"
YouTube = "https://www.youtube.com/channel/UCfLnv9X8jyHTe6gJ4hVBo9Q"
Slack = "https://dagster.io/slack"
Blog = "https://dagster.io/blog"
Newsletter = "https://dagster.io/newsletter-signup"

[project.optional-dependencies]
insights = [
    "pyarrow",
]
docker = [
    "docker",
    "dagster-docker==0.29.7",
]
kubernetes = [
    "kubernetes",
    "dagster-k8s==0.29.7",
]
ecs = [
    "dagster-aws==0.29.7",
    "boto3",
]
sandbox = [
    "supervisor",
]
pex = [
    "boto3",
]
serverless = [
    "boto3",
]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-test",
    "dagster-aws",
    "dagster-cloud-cli",
    "dagster-dbt",
    "dagster-dg-cli",
    "dagster-docker",
    "dagster-k8s",
    "dagster-rest-resources",
    "dbt-bigquery>=1.9.0",
    "dbt-core",
    "dbt-duckdb",
    "dbt-snowflake",
    "docker",
    "freezegun",
    "isort",
    "kubernetes",
    "moto[all]",
    "mypy",
    "pip",
    "psutil",
    "pylint",
    "pytest",
    "responses",
    "syrupy",
    "types-PyYAML",
    "types-requests",
    "wordcloud",
]

[tool.uv.sources.dagster]
path = "../dagster"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../libraries/dagster-shared"
editable = true

[tool.uv.sources.dagster-test]
path = "../dagster-test"
editable = true

[tool.uv.sources.dagster-aws]
path = "../libraries/dagster-aws"
editable = true

[tool.uv.sources.dagster-cloud-cli]
path = "../libraries/dagster-cloud-cli"
editable = true

[tool.uv.sources.dagster-dbt]
path = "../libraries/dagster-dbt"
editable = true

[tool.uv.sources.dagster-dg-cli]
path = "../libraries/dagster-dg-cli"
editable = true

[tool.uv.sources.dagster-docker]
path = "../libraries/dagster-docker"
editable = true

[tool.uv.sources.dagster-k8s]
path = "../libraries/dagster-k8s"
editable = true

[tool.uv.sources.dagster-rest-resources]
path = "../libraries/dagster-rest-resources"
editable = true
