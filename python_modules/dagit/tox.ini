[tox]
requires =
    tox-uv>=1
skipsdist = true

[testenv]
download = True
passenv =
    CI_*
    BUILDKITE*
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
setenv =
  STRICT_GRPC_SERVER_PROCESS_WAIT = "1"
deps =
  objgraph
  -e ../dagster[test]
  -e ../dagster-pipes
  -e ../libraries/dagster-shared
  -e ../dagster-graphql
  -e ../dagster-webserver
  -e .

allowlist_externals =
  /bin/bash
  uv
commands =
  !windows: /bin/bash -c '! uv pip list --exclude-editable | grep -e dagster -e dagit'
  pytest -v --junitxml=dagit_test_results.xml {posargs}
