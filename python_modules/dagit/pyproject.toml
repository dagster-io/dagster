[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagit"
version = "1!0+dev"
description = "Web UI for dagster."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
readme = "README.rst"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster-webserver==1!0+dev",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster"

[project.scripts]
dagit = "dagster_webserver.cli:main"
dagit-debug = "dagster_webserver.debug:main"

[project.optional-dependencies]
notebook = [
    "dagster-webserver[notebook]==1!0+dev",
]
test = [
    "dagster-webserver[test]==1!0+dev",
]
