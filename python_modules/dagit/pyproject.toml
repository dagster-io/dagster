[build-system]
requires = [
    "hatchling>=1.19.0",
]
build-backend = "hatchling.build"

[project]
name = "dagit"
version = "1.13.5"
description = "Web UI for dagster."
authors = [
    { name = "Dagster Labs", email = "hello@dagsterlabs.com" },
]
license = "Apache-2.0"
readme = "README.rst"
requires-python = ">=3.10,<3.15"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
dependencies = [
    "dagster-webserver==1.13.5",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster"

[project.scripts]
dagit = "dagster_webserver.cli:main"
dagit-debug = "dagster_webserver.debug:main"

[project.optional-dependencies]
notebook = [
    "dagster-webserver[notebook]==1.13.5",
]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-graphql",
    "dagster-webserver",
    "objgraph",
    "dagster-webserver[test]==1!0+dev",
]

[tool.uv.sources.dagster]
path = "../dagster"
editable = true

[tool.uv.sources.dagster-pipes]
path = "../dagster-pipes"
editable = true

[tool.uv.sources.dagster-shared]
path = "../libraries/dagster-shared"
editable = true

[tool.uv.sources.dagster-graphql]
path = "../dagster-graphql"
editable = true

[tool.uv.sources.dagster-webserver]
path = "../dagster-webserver"
editable = true
