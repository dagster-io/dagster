[build-system]
requires = ["hatchling>=1.19.0"]
build-backend = "hatchling.build"

[project]
name = "dagit"
version = "1!0+dev"
description = "Web UI for dagster."
authors = [{name = "Dagster Labs", email = "hello@dagsterlabs.com"}]
license = "Apache-2.0"
readme = "README.rst"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dagster-webserver==1!0+dev",
]

[project.urls]
Homepage = "https://github.com/dagster-io/dagster"

[project.scripts]
dagit = "dagster_webserver.cli:main"
dagit-debug = "dagster_webserver.debug:main"

[project.optional-dependencies]
notebook = [
    "dagster-webserver[notebook]==1!0+dev",
]

[dependency-groups]
test = [
    "dagster[test]",
    "dagster-pipes",
    "dagster-shared",
    "dagster-graphql",
    "dagster-webserver",
    "objgraph",
    "dagster-webserver[test]==1!0+dev",
]

[tool.uv.sources]
dagster = { path = "../dagster", editable = true }
dagster-pipes = { path = "../dagster-pipes", editable = true }
dagster-shared = { path = "../libraries/dagster-shared", editable = true }
dagster-graphql = { path = "../dagster-graphql", editable = true }
dagster-webserver = { path = "../dagster-webserver", editable = true }
