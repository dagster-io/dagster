# Tracks paths assigned to the `ty` type checker for this environment.
#
# This file is intended to be read and written by automation as we
# migrate code from `pyright` to `ty`. Any path listed under `paths` is
# checked by `ty` and is implicitly excluded from `pyright` — there is
# no need to also list it in `exclude.txt`.
#
# Entries may be either a library root (e.g.
# `python_modules/libraries/dagster-prometheus`) or any subpath within a
# library (e.g. `python_modules/dagster/dagster/_serdes`). Each entry is
# treated as a filesystem path prefix.

