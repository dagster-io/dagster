[tox]
requires =
    tox-uv>=1.16
envlist = py312
skipsdist = True

[testenv]
runner = uv-venv-lock-runner
uv_sync_locked = false
uv_sync_flags = --frozen
download = True
passenv =
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
    CI_*
    BUILDKITE*
dependency_groups =
    test
allowlist_externals =
  /bin/bash
  echo
  uv
commands =
  pytest -vv --durations 10 ./dagster_buildkite_tests {posargs}
