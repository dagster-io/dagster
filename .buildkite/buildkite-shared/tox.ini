[tox]
requires =
    tox-uv>=1
envlist = py312
skipsdist = True

[testenv]
download = True
passenv =
    PYTEST_ADDOPTS
    PYTEST_PLUGINS
    CI_*
    BUILDKITE*
deps =
    -e .
    pytest
allowlist_externals =
  /bin/bash
  echo
  uv
commands =
  pytest -vv --durations 10 ./buildkite_shared_tests {posargs}
